name: Build and Test

on:
  workflow_call:
    inputs:
      repo:
        description: "Repository to checkout, in owner/name format."
        type: string
        default: 'openDAQ/openDAQ'
      repo-ref:
        description: "Commit, branch or tag of the repository to checkout. If empty, uses the default branch."
        type: string
        default: ''
      opendaq-ref:
        description: "openDAQ commit, branch or tag. If empty, uses the opendaq_ref file from the repo."
        type: string
        default: ''
      include-jobs:
        description: "JSON array of wildcard patterns to include matrix jobs, e.g. '[\"ubuntu-*\"]'"
        type: string
        default: '["*"]'
      exclude-jobs:
        description: "JSON array of wildcard patterns to exclude matrix jobs, e.g. '[\"*-debug\", \"macos-*\"]'"
        type: string
        default: '[]'
      packages:
        description: 'JSON array of package requests, e.g. [{"match-jobs": ["ubuntu-*"], "apt-install": ["libpcap-dev"]}]'
        type: string
        default: '[]'
      cmake-presets:
        description: 'JSON array of preset configs, e.g. [{"match-jobs": ["*"], "configure-preset": "module", "test-preset": "module-test"}]'
        type: string
        default: '[]'
      upload-pattern:
        description: "Pattern for artifact names, * is replaced with the original name, e.g. 'full-*'"
        type: string
        default: '*'
      timeout:
        description: 'JSON array of timeout configs, e.g. [{"match-jobs": ["*"], "timeout-minutes": 180}]'
        type: string
        default: '[]'
    outputs:
      matrix:
        description: "Generated build matrix JSON"
        value: ${{ jobs.generate.outputs.matrix }}
      cmake-user-presets:
        description: "Generated CMakeUserPresets.json content"
        value: ${{ jobs.generate.outputs.cmake-user-presets }}

jobs:
  generate:
    name: Generate
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      cmake-user-presets: ${{ steps.presets.outputs.cmake-user-presets }}
    steps:
      - name: Generate matrix
        id: matrix
        shell: python3 {0}
        run: |
          import json, os
          from fnmatch import fnmatch

          include_jobs = json.loads(r"""${{ inputs.include-jobs }}""")
          exclude_jobs = json.loads(r"""${{ inputs.exclude-jobs }}""")
          user_packages = json.loads(r"""${{ inputs.packages }}""")
          cmake_presets = json.loads(r"""${{ inputs.cmake-presets }}""")
          upload_pattern = """${{ inputs.upload-pattern }}"""
          timeout_configs = json.loads(r"""${{ inputs.timeout }}""")

          print(f"Input: include-jobs = {json.dumps(include_jobs) if include_jobs else 'None'}")
          print(f"Input: exclude-jobs = {json.dumps(exclude_jobs) if exclude_jobs else 'None'}")
          print(f"Input: packages = {json.dumps(user_packages) if user_packages else 'None'}")

          # --- General config ---

          _base = {
              "runner": None,
              "image": None,
              "container-options": "",
              "bootstrap": None,
              "package-managers": [],
              "generator": None,
              "toolset": None,
              "target-arch": None,
              "cc": None,
              "cxx": None,
              "cmd-sudo": None,
              "cmd-apt-envs": ["DEBIAN_FRONTEND=noninteractive", "TZ=Etc/UTC"],
              "cmd-brew-envs": [],
              "cmd-choco-envs": [],
              "cmd-winget-envs": [],
              "cmd-pip-envs": [],
              "fmt-apt-install": "{sudo} {envs} apt-get -o Acquire::Retries=5 install -y --no-install-recommends {pkgs}",
              "fmt-pip-install": "python{ver}{arch} -m pip install {pkgs}",
              "fmt-brew-install": "{envs} brew install {pkgs}",
              "fmt-choco-install": "{envs} choco install -y {pkgs}",
              "fmt-winget-install": "{envs} winget install --accept-source-agreements --accept-package-agreements --id {pkgs}",
              "apt-install-default": [],
              "brew-install-default": [],
              "choco-install-default": [],
              "winget-install-default": [],
              "pip-install-default": [],
              "apt-install": [],
              "brew-install": [],
              "choco-install": [],
              "winget-install": [],
              "pip-install": [],
              "cmd-run-post-package": "",
              "cmd-ctest-priv": "",
              "timeout-minutes": 120,
              "setup-msvc-toolchain": False,
              "enable-tests": False,
              "gtest-artifact": "",
              "apt-repos-ppa": [],
          }

          # --- Ubuntu configs ---

          _ubuntu_guest_x86_64_ninja = {
              **_base,
              "runner": "ubuntu-latest",
              "bootstrap": "apt-get update && apt-get install -y git python3-pip curl gnupg ca-certificates",
              "package-managers": ["apt", "pip"],
              "cmd-sudo": "",
              "generator": "Ninja",
              "cc": "gcc",
              "cxx": "g++",
              "apt-install-default": ["mono-runtime", "libmono-system-json-microsoft4.0-cil", "libmono-system-data4.0-cil", "jq"],
          }

          _ubuntu_20_04_x86_64_ninja = { **_ubuntu_guest_x86_64_ninja, "image": "ubuntu:20.04" }
          _ubuntu_20_04_x86_ninja = {
              **_ubuntu_20_04_x86_64_ninja,
              "target-arch": "x86",
              "container-options": "--ulimit stack=4194304:4194304",
              "bootstrap": "dpkg --add-architecture i386 && apt-get update && apt-get install -y git python3-pip curl gnupg ca-certificates",
          }
          _ubuntu_24_04_x86_64_ninja = {
              **_ubuntu_guest_x86_64_ninja,
              "image": "ubuntu:24.04",
              "fmt-pip-install": "python{ver}{arch} -m pip install --break-system-packages {pkgs}",
              "allow-python-ppa": True,
          }
          _ubuntu_24_04_x86_ninja = {
              **_ubuntu_24_04_x86_64_ninja,
              "target-arch": "x86",
              "bootstrap": "dpkg --add-architecture i386 && apt-get update && apt-get install -y git python3-pip curl gnupg ca-certificates",
          }

          # --- macOS configs ---

          _macos_ninja = {
              **_base,
              "package-managers": ["brew", "pip"],
              "brew-install-default": ["mono"],
              "generator": "Ninja",
              "cmd-sudo": "sudo",
              "fmt-pip-install": "python{ver}{arch} -m pip install --break-system-packages {pkgs}",
          }

          _macos_15_armv8_ninja   = {**_macos_ninja, "runner": "macos-15"}
          _macos_15_x86_64_ninja  = {**_macos_ninja, "runner": "macos-15-intel"}
          _macos_26_armv8_ninja   = {**_macos_ninja, "runner": "macos-26"}
          _macos_26_x86_64_ninja  = {**_macos_ninja, "runner": "macos-26-intel"}

          _apple_clang_cc = { "cc": "/usr/bin/clang" }
          _apple_clang_cxx = { "cxx": "/usr/bin/clang++" }

          # --- Windows configs ---

          _windows_2022_x86_64 = {
              **_base,
              "runner": "windows-2022",
              "package-managers": ["choco", "winget", "pip"],
              "fmt-pip-install": "py -{ver}{arch} -m pip install {pkgs}",
              "setup-msvc-toolchain": True,
          }

          _windows_2022_x86_64_msvs  = {**_windows_2022_x86_64, "generator": "Visual Studio 17 2022"}
          _windows_2022_x86_64_ninja = {**_windows_2022_x86_64, "generator": "Ninja"}

          # --- Intel oneAPI configs (lookup by 'setup-intel-cc' job field) ---

          _setup_intel_cc = {
              "linux-intel-cc": {
                  "url":         "https://registrationcenter-download.intel.com/akdlm/IRC_NAS/99f4837a-25b7-425d-a897-60af022676ea/intel-oneapi-base-toolkit-2025.3.2.21.sh",
                  "components":  ["intel.oneapi.lin.dpcpp-cpp-compiler"],
                  "setvars":     "/opt/intel/oneapi/setvars.sh",
                  "extra":       "",
                  "fmt-extract": "./{installer} -x -f extracted --log extract.log",
                  "fmt-install": "{sudo} extracted/*/bootstrapper -s --action install --components={components} --eula=accept --log-dir=. {extra}",
                  "fmt-source":  '. "{setvars}" --force',
              },
              "windows-intel-cc": {
                  "url":         "https://registrationcenter-download.intel.com/akdlm/IRC_NAS/18a420c5-bfb7-4eb0-b04a-41a4fc7cc3b3/intel-oneapi-base-toolkit-2025.3.2.20.exe",
                  "components":  ["intel.oneapi.win.cpp-dpcpp-common"],
                  "setvars":     r"C:\Program Files (x86)\Intel\oneAPI\setvars.bat",
                  "extra":       "-p=NEED_VS2017_INTEGRATION=0 -p=NEED_VS2019_INTEGRATION=0 -p=NEED_VS2022_INTEGRATION=0",
                  "fmt-extract": "{installer} -s -x -f extracted --log extract.log",
                  "fmt-install": "extracted\\bootstrapper.exe -s --action install --components={components} --eula=accept --log-dir=. {extra}",
                  "fmt-source":  'call "{setvars}" --force',
              },
          }

          # --- Jobs configs ---

          jobs_cfg = {
              "windows-2022-x86_64-msvs-v143-debug":        {**_windows_2022_x86_64_msvs,   "toolset": "v143",                            "build-type": "Debug" },
              "windows-2022-x86-msvs-v143-release":         {**_windows_2022_x86_64_msvs,   "toolset": "v143",                            "build-type": "Release",  "target-arch": "x86" },

              "windows-2022-x86_64-ninja-clang-release":    {**_windows_2022_x86_64_ninja,  "cc": "clang",      "cxx": "clang++",         "build-type": "Release" },
              "windows-2022-x86_64-ninja-intel-cc-release": {**_windows_2022_x86_64_ninja,  "cc": "icx",        "cxx": "icx",             "build-type": "Release",  "setup-intel-cc": "windows-intel-cc" },

              "ubuntu-20.04-x86-ninja-gcc-7-release":       {**_ubuntu_20_04_x86_ninja,     "cc": "gcc-7",      "cxx": "g++-7",           "build-type": "Release",  "apt-install": ["gcc-7", "g++-7", "gcc-7-multilib", "g++-7-multilib"] },
              "ubuntu-20.04-x86_64-ninja-clang-9-release":  {**_ubuntu_20_04_x86_64_ninja,  "cc": "clang-9",    "cxx": "clang++-9",       "build-type": "Release",  "apt-install": ["clang-9"] },

              "ubuntu-24.04-x86-ninja-gcc-13-release":      {**_ubuntu_24_04_x86_ninja,     "cc": "gcc-13",     "cxx": "g++-13",          "build-type": "Release",  "apt-install": ["gcc-13", "g++-13", "gcc-13-multilib", "g++-13-multilib"] },
              "ubuntu-24.04-x86-ninja-gcc-14-release":      {**_ubuntu_24_04_x86_ninja,     "cc": "gcc-14",     "cxx": "g++-14",          "build-type": "Release",  "apt-install": ["gcc-14", "g++-14", "gcc-14-multilib", "g++-14-multilib"] },
              "ubuntu-24.04-x86_64-ninja-gcc-14-debug":     {**_ubuntu_24_04_x86_64_ninja,  "cc": "gcc-14",     "cxx": "g++-14",          "build-type": "Debug",   "apt-install": ["gcc-14", "g++-14"] },
              "ubuntu-24.04-x86_64-ninja-gcc-14-release":   {**_ubuntu_24_04_x86_64_ninja,  "cc": "gcc-14",     "cxx": "g++-14",          "build-type": "Release",  "apt-install": ["gcc-14", "g++-14"] },
              "ubuntu-24.04-x86_64-ninja-clang-18-release": {**_ubuntu_24_04_x86_64_ninja,  "cc": "clang-18",   "cxx": "clang++-18",      "build-type": "Release",  "apt-install": ["clang-18"] },
              "ubuntu-24.04-x86_64-ninja-intel-cc-release": {**_ubuntu_24_04_x86_64_ninja,  "cc": "icx",        "cxx": "icpx",            "build-type": "Release",  "setup-intel-cc": "linux-intel-cc"},

              "macos-26-x86_64-ninja-appleclang-debug":     {**_macos_26_x86_64_ninja,      **_apple_clang_cc,  **_apple_clang_cxx,        "build-type": "Debug"},
              "macos-26-armv8-ninja-appleclang-release":    {**_macos_26_armv8_ninja,       **_apple_clang_cc,  **_apple_clang_cxx,        "build-type": "Release"},

              "macos-15-x86_64-ninja-appleclang-release":   {**_macos_15_x86_64_ninja,      **_apple_clang_cc,  **_apple_clang_cxx,        "build-type": "Release"},
          }

          # --- Generate jobs matrix ---

          def matches_any(name, patterns):
              return any(fnmatch(name, p) for p in patterns)

          matrix = []
          for job_name, cfg in jobs_cfg.items():
              sudo = cfg.get("cmd-sudo") or ""
              build_type = cfg.get("build-type", "Release")
              cc  = cfg.get("cc") or ""
              cxx = cfg.get("cxx") or ""
              
              apt_supported = "apt" in cfg.get("package-managers", [])
              apt_repos_ppa = list(cfg.get("apt-repos-ppa") or []) if apt_supported else None

              runner = cfg["runner"]
              image = cfg.get("image") or ""

              if not matches_any(job_name, include_jobs):
                  print(f"Matrix job '{job_name}': skipped, does not match 'include-jobs' input")
                  continue

              if matches_any(job_name, exclude_jobs):
                  print(f"Matrix job '{job_name}': skipped by 'exclude-jobs' input")
                  continue

              fmt_pip_install = cfg.get("fmt-pip-install", "")
              if not fmt_pip_install:
                  print(f"::error::Matrix job '{job_name}': 'fmt-pip-install' is not defined")

              supported_pms = set(cfg.get("package-managers", []))

              # collect user packages, run command, and python request for this job
              user_pkgs = {}
              python_version = ""
              for req in user_packages:
                  if not matches_any(job_name, req.get("match-jobs", ["*"])):
                      continue

                  user_install = {k: v for k, v in req.items() if k.endswith("-install") and v}
                  for k, v in user_install.items():
                      pm = k.removesuffix("-install")
                      if pm not in supported_pms:
                          print(f"::warning::Matrix job '{job_name}': '{pm}' is not supported by this runner, skipping installation of {v}")
                          continue
                      user_pkgs.setdefault(k, []).extend(v)
                  user_pkgs["run"] = req.get("run", user_pkgs.get("run", ""))
                  python_version = req.get("use-python-version", python_version)

              # Python via apt: deadsnakes (+ ensurepip) on allow-python-ppa configs, else system repos.
              cmd_ensurepip = ""
              if python_version and "apt" in supported_pms:
                  user_pkgs.setdefault("apt-install", []).extend([
                      f"python{python_version}",
                      f"python{python_version}-dev",
                      f"python{python_version}-venv",
                  ])
                  if cfg.get("allow-python-ppa"):
                      apt_repos_ppa.append("deadsnakes/ppa")
                      cmd_ensurepip = f"python{python_version} -m ensurepip || true"

              python_arch = "x86" if cfg.get("target-arch", "") == "x86" else ""
              py_ver = python_version or "3"
              py_arch = "-32" if python_arch == "x86" else ""

              # merge and build install commands per package manager
              install_cmds = {}
              for pm in supported_pms:
                  envs = " ".join(cfg.get(f"cmd-{pm}-envs", []))
                  install = cfg.get(f"{pm}-install-default", []) + cfg.get(f"{pm}-install", []) + user_pkgs.get(f"{pm}-install", [])
                  if install:
                      fmt = cfg.get(f"fmt-{pm}-install", "")
                      if not fmt:
                          print(f"::error::Matrix job '{job_name}': 'fmt-{pm}-install' is not defined but packages {install} are requested")
                          continue

                      fmt_args = dict(sudo=sudo, envs=envs, ver=py_ver, arch=py_arch)
                      if pm == "winget":
                          install_cmds["cmd-install-winget"] = "; ".join(fmt.format(pkgs=pkg, **fmt_args).strip() for pkg in install)
                      else:
                          install_cmds[f"cmd-install-{pm}"] = fmt.format(pkgs=" ".join(install), **fmt_args).strip()

              install_cmds["cmd-run-post-package"] = user_pkgs.get("run", "")

              # find test-preset and run-tests-priv for this job
              test_preset = ""
              run_tests_priv = False
              for entry in cmake_presets:
                  if matches_any(job_name, entry.get("match-jobs", ["*"])):
                      test_preset = entry.get("test-preset", test_preset)
                      run_tests_priv = entry.get("run-tests-priv", run_tests_priv)
              
              cmd_run_tests_priv = f"sudo -E " if run_tests_priv and sudo else ""
              
              enable_tests = bool(test_preset)
              gtest_artifact = upload_pattern.replace("*", f"test-results-{job_name}") if enable_tests else ""

              # find timeout for this job
              timeout_minutes = cfg.get("timeout-minutes", 120)
              for req in timeout_configs:
                  if matches_any(job_name, req.get("match-jobs", ["*"])):
                      timeout_minutes = req.get("timeout-minutes", timeout_minutes)

              setup_msvc_toolchain = cfg.get("setup-msvc-toolchain", False)

              # Materialize PPA-setup command (only when apt is supported and any PPA is requested)
              cmd_install_ppas = ""
              if apt_supported and apt_repos_ppa:
                  parts = [f"{sudo} apt-get install -y software-properties-common"]
                  parts += [f"{sudo} add-apt-repository -y ppa:{p}" for p in apt_repos_ppa]
                  parts += [f"{sudo} apt-get update"]
                  cmd_install_ppas = " && ".join(parts)

              # Materialize Intel oneAPI commands if 'setup-intel-cc' is set
              intel_cc_url = ""
              intel_cc_extract_cmd = ""
              intel_cc_install_cmd = ""
              source_cmd = ""
              setup_intel_cc_key = cfg.get("setup-intel-cc") or ""
              if setup_intel_cc_key:
                  ic = _setup_intel_cc[setup_intel_cc_key]
                  intel_cc_url = ic["url"]
                  installer  = intel_cc_url.rsplit("/", 1)[-1]
                  components = ",".join(ic["components"])
                  intel_cc_extract_cmd = ic["fmt-extract"].format(installer=installer)
                  intel_cc_install_cmd = ic["fmt-install"].format(sudo=sudo, components=components, extra=ic["extra"]).strip()
                  source_cmd           = ic["fmt-source"].format(setvars=ic["setvars"])

              matrix.append({
                  "name": job_name,
                  "runner": runner,
                  "image": image,
                  "container-options": cfg.get("container-options") or "",
                  "bootstrap": cfg.get("bootstrap") or "",
                  "generator": cfg["generator"],
                  "toolset": cfg.get("toolset") or "",
                  "target-arch": cfg.get("target-arch") or "",
                  "cc": cc,
                  "cxx": cxx,
                  "build-type": build_type,
                  "timeout-minutes": timeout_minutes,
                  "setup-msvc-toolchain": setup_msvc_toolchain,
                  "cmd-install-ppas":     cmd_install_ppas,
                  "cmd-ensurepip":        cmd_ensurepip,
                  "intel-cc-url":         intel_cc_url,
                  "intel-cc-extract-cmd": intel_cc_extract_cmd,
                  "intel-cc-install-cmd": intel_cc_install_cmd,
                  "source-cmd":           source_cmd,
                  "enable-tests": enable_tests,
                  "gtest-artifact": gtest_artifact,
                  "cmd-ctest-priv": cmd_run_tests_priv,
                  "python-version": python_version,
                  "python-arch": python_arch,
                  **install_cmds,
              })

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={json.dumps({'include': matrix})}\n")

          print(f"Output: matrix = {json.dumps({'include': matrix}, indent=2)}")

      - name: Generate user presets
        id: presets
        shell: python3 {0}
        run: |
          import json, os
          from fnmatch import fnmatch

          cmake_presets = json.loads(r"""${{ inputs.cmake-presets }}""")
          matrix = json.loads(r"""${{ steps.matrix.outputs.matrix }}""")["include"]

          print(f"Input: cmake-presets = {json.dumps(cmake_presets) if cmake_presets else 'None'}")

          build_dir = "build/output"
          user_presets = {"version": 4, "configurePresets": [], "buildPresets": [], "testPresets": []}

          for entry in matrix:
              name = entry["name"]
              build_type = entry.get("build-type") or ""
              generator = entry.get("generator") or ""
              toolset = entry.get("toolset") or ""
              target_arch = entry.get("target-arch") or ""
              architecture = "Win32" if target_arch == "x86" and generator.startswith("Visual Studio") else ""
              cc = entry.get("cc") or ""
              cxx = entry.get("cxx") or ""

              # find matching cmake-presets config
              configure_preset = ""
              test_preset = ""
              cache_vars = {}
              for entry in cmake_presets:
                  if any(fnmatch(name, p) for p in entry.get("match-jobs", ["*"])):
                      configure_preset = entry.get("configure-preset", configure_preset)
                      test_preset = entry.get("test-preset", test_preset)
                      cache_vars.update(entry.get("cache-variables", {}))

              user_presets["configurePresets"].append({
                  "name": name,
                  **({"inherits": [configure_preset]} if configure_preset else {}),
                  **({"generator": generator} if generator else {}),
                  **({"toolset": toolset} if toolset else {}),
                  **({"architecture": architecture} if architecture else {}),
                  "binaryDir": "$" + "{sourceDir}" + f"/{build_dir}",
                  "cacheVariables": {
                      **cache_vars,
                      **({"CMAKE_BUILD_TYPE": build_type} if build_type else {}),
                      **({"CMAKE_C_COMPILER": cc} if cc else {}),
                      **({"CMAKE_CXX_COMPILER": cxx} if cxx else {}),
                  },
              })

              user_presets["buildPresets"].append({
                  "name": name,
                  "configurePreset": name,
                  **({"configuration": build_type} if build_type else {}),
              })

              if test_preset:
                  user_presets["testPresets"].append({
                      "name": name,
                      "configurePreset": name,
                      "inherits": [test_preset],
                      **({"configuration": build_type} if build_type else {}),
                      "output": {"outputOnFailure": True},
                  })

          with open("CMakeUserPresets.json", "w") as f:
              json.dump(user_presets, f, indent=2)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"cmake-user-presets={json.dumps(user_presets)}\n")

      - name: Job summary
        if: always()
        shell: bash
        run: |
          s() { [ "$1" = "success" ] && echo "✅" || ([ "$1" = "skipped" ] && echo "➖" || echo "❌"); }
          overall="✅"
          [[ "${{ steps.matrix.outcome }}" == "failure" || "${{ steps.presets.outcome }}" == "failure" ]] && overall="❌"
          {
            echo "<details><summary>${overall} Generate job inputs</summary>"
            echo ""
            echo '```json'
            jq -n \
              --arg ref "${{ inputs.opendaq-ref }}" \
              --argjson exclude '${{ inputs.exclude-jobs || '[]' }}' \
              --argjson packages '${{ inputs.packages || '[]' }}' \
              --argjson presets '${{ inputs.cmake-presets || '[]' }}' \
              --arg upload "${{ inputs.upload-pattern }}" \
              '{
                "opendaq-ref": $ref,
                "exclude-jobs": $exclude,
                "packages": $packages,
                "cmake-presets": $presets,
                "upload-pattern": $upload
              }'
            echo '```'
            echo ""
            echo "</details>"
            echo ""
            echo "<details><summary>$(s ${{ steps.matrix.outcome }}) Generate matrix (matrix.json)</summary>"
            echo ""
            echo '```json'
            echo '${{ steps.matrix.outputs.matrix }}' | jq . 2>/dev/null || echo "Not generated"
            echo ""
            echo '```'
            echo ""
            echo "</details>"
            echo ""
            echo "<details><summary>$(s ${{ steps.presets.outcome }}) Generate presets (CMakeUserPresets.json)</summary>"
            echo ""
            echo '```json'
            cat CMakeUserPresets.json 2>/dev/null || echo "Not generated"
            echo ""
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

  ci:
    needs: generate
    if: ${{ needs.generate.outputs.matrix != '' }}
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    container:
      image: ${{ matrix.image }}
      options: ${{ matrix.container-options }}
    timeout-minutes: ${{ matrix.timeout-minutes }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate.outputs.matrix) }}

    steps:
      - name: Bootstrap
        if: matrix.bootstrap != ''
        run: ${{ matrix.bootstrap }}

      - name: Setup Git
        if: matrix.image != ''
        shell: bash
        run: git config --global --add safe.directory '*'
# -------------------------------------
      - name: Checkout openDAQ
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.repo }}
          ref: ${{ inputs.repo-ref }}
# -------------------------------------
      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: 4.3.2

      - name: Setup Ninja
        if: matrix.generator == 'Ninja'
        uses: seanmiddleditch/gha-setup-ninja@v6

      - name: Override opendaq_ref
        if: ${{ inputs.opendaq-ref != '' }}
        shell: bash
        run: echo "${{ inputs.opendaq-ref }}" > opendaq_ref

      - name: Setup PPA repositories
        if: matrix.cmd-install-ppas != ''
        run: ${{ matrix.cmd-install-ppas }}

      - name: Install dependencies (apt)
        if: matrix.cmd-install-apt != ''
        run: ${{ matrix.cmd-install-apt }}

      - name: Install dependencies (brew)
        if: matrix.cmd-install-brew != ''
        run: ${{ matrix.cmd-install-brew }}

      - name: Install dependencies (choco)
        if: matrix.cmd-install-choco != ''
        run: ${{ matrix.cmd-install-choco }}

      - name: Install dependencies (winget)
        if: matrix.cmd-install-winget != ''
        run: ${{ matrix.cmd-install-winget }}

      - name: Setup Python (GitHub Actions)
        if: matrix.image == '' && matrix.python-version != ''
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: ${{ matrix.python-arch }}

      - name: Setup Python (ensurepip)
        if: matrix.cmd-ensurepip != ''
        run: ${{ matrix.cmd-ensurepip }}

      - name: Install dependencies (pip)
        if: matrix.cmd-install-pip != ''
        run: ${{ matrix.cmd-install-pip }}

      - name: Run post-package
        if: matrix.cmd-run-post-package != ''
        run: ${{ matrix.cmd-run-post-package }}

      - name: Write CI presets
        shell: bash
        run: echo '${{ needs.generate.outputs.cmake-user-presets }}' > CMakeUserPresets.json

      - name: Setup MSVC toolchain
        if: matrix.setup-msvc-toolchain
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Intel C/C++ compiler
        if: matrix.intel-cc-url
        shell: python3 {0}
        env:
          URL:         ${{ matrix.intel-cc-url }}
          EXTRACT_CMD: ${{ matrix.intel-cc-extract-cmd }}
          INSTALL_CMD: ${{ matrix.intel-cc-install-cmd }}
        run: |
          import os, subprocess

          url = os.environ["URL"]
          installer = url.rsplit("/", 1)[-1]
          subprocess.run(["curl", "--output", installer, "--url", url,
                          "--retry", "5", "--retry-delay", "5", "-fSL"], check=True)
          os.chmod(installer, 0o755)

          subprocess.run(os.environ["EXTRACT_CMD"], shell=True, check=True)
          subprocess.run(os.environ["INSTALL_CMD"], shell=True, check=True)

      - name: Source environment
        if: matrix.source-cmd
        shell: python3 {0}
        env:
          SOURCE_CMD: ${{ matrix.source-cmd }}
        run: |
          import os, sys, json, subprocess

          dump = f'"{sys.executable}" -c "import os, json; print(json.dumps(dict(os.environ)))"'
          result = subprocess.run(f'{os.environ["SOURCE_CMD"]} && {dump}',
                                  shell=True, capture_output=True, text=True, check=True)
          # Last line of stdout is the JSON dump (setvars.bat may print banner before it)
          after = json.loads(result.stdout.splitlines()[-1])

          path_key = next((k for k in after if k.upper() == "PATH"), None)
          if path_key:
              orig = set(os.environ.get(path_key, "").split(os.pathsep))
              updated = after[path_key].split(os.pathsep)
              new_entries = [p for p in updated if p and p not in orig]
              with open(os.environ["GITHUB_PATH"], "a") as f:
                  f.writelines(f"{p}\n" for p in new_entries)

          internals = {"SHLVL", "=ExitCode", "=ExitCodeAscii"}
          with open(os.environ["GITHUB_ENV"], "a") as f:
              for k, v in after.items():
                  if k == path_key or not v or k.startswith("_") or k in internals:
                      continue
                  if os.environ.get(k) != v:
                      f.write(f"{k}={v}\n")

      - name: Configure
        id: configure
        run: cmake --preset ${{ matrix.name }}

      - name: Build
        id: build
        run: cmake --build --preset ${{ matrix.name }}

      - name: Setup GTest
        id: setup-gtest
        if: matrix.enable-tests
        shell: python3 {0}
        run: |
          import os
          test_results_dir = os.path.join(os.environ["GITHUB_WORKSPACE"], "build", "test-results")
          os.makedirs(test_results_dir, exist_ok=True)
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"test-results-dir={test_results_dir}{os.sep}\n")

      - name: Setup diagnostics (strace)
        if: matrix.enable-tests && contains(matrix.name, 'x86-ninja-gcc')
        shell: bash
        run: |
          apt-get install -y --no-install-recommends strace
          mkdir -p "${{ github.workspace }}/diag"

      - name: Test
        id: test
        if: matrix.enable-tests
        shell: bash
        env:
          GTEST_OUTPUT: xml:${{ steps.setup-gtest.outputs.test-results-dir }}
        run: |
          set +e
          DIAG="${{ github.workspace }}/diag"

          if [[ "${{ matrix.name }}" == *x86-ninja-gcc* ]]; then
            # Background: dump /proc/<pid>/maps every 50ms while test_opcuatms_integration is alive
            (
              while true; do
                PID=$(pidof test_opcuatms_integration 2>/dev/null | awk '{print $1}')
                if [ -n "$PID" ]; then
                  i=0
                  while kill -0 "$PID" 2>/dev/null; do
                    cp "/proc/$PID/maps" "$DIAG/maps.$(printf %05d $i).txt" 2>/dev/null || true
                    i=$((i+1))
                    sleep 0.05
                  done
                fi
                sleep 0.1
              done
            ) &
            MAPS_BG=$!

            # strace -ff writes one file per process (strace.<PID>); -e trace= filters to mem/thread syscalls
            strace -ff -e trace=mmap,munmap,mprotect,clone,clone3,brk \
              -o "$DIAG/strace" \
              ${{ matrix.cmd-ctest-priv }} ctest --preset ${{ matrix.name }}
            RC=$?

            kill $MAPS_BG 2>/dev/null || true
            wait 2>/dev/null || true
            exit $RC
          else
            ${{ matrix.cmd-ctest-priv }} ctest --preset ${{ matrix.name }}
          fi

      - name: Upload diagnostic artifacts
        if: ${{ !cancelled() && matrix.enable-tests && contains(matrix.name, 'x86-ninja-gcc') }}
        uses: actions/upload-artifact@v7
        with:
          name: diag-${{ matrix.name }}
          path: ${{ github.workspace }}/diag/
          if-no-files-found: warn
          retention-days: 7

      - name: Upload test results
        if: ${{ !cancelled() && contains('success failure', steps.test.outcome) && matrix.gtest-artifact != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.gtest-artifact }}
          path: ${{ steps.setup-gtest.outputs.test-results-dir }}
          if-no-files-found: ignore
          retention-days: 7

      - name: Job summary
        if: failure()
        shell: bash
        run: |
          s() { [ "$1" = "success" ] && echo "✅" || ([ "$1" = "skipped" ] && echo "➖" || echo "❌"); }
          {
            echo "<details><summary>❌ ${{ matrix.name }}</summary>"
            echo ""
            echo "<details><summary>CMakeUserPresets.json</summary>"
            echo ""
            echo '```bash'
            echo "cat > CMakeUserPresets.json <<'EOF'"
            jq . CMakeUserPresets.json 2>/dev/null
            echo "EOF"
            echo '```'
            echo ""
            echo "</details>"
            echo ""
            echo '```bash'
            if [ -n "${{ inputs.opendaq-ref }}" ]; then
              echo ""
              echo "# Override openDAQ ref:"
              echo 'echo "${{ inputs.opendaq-ref }}" > opendaq_ref'
            fi
            echo ""
            echo "# $(s ${{ steps.configure.outcome }}) Configure:"
            echo "cmake --preset ${{ matrix.name }}"
            echo ""
            echo "# $(s ${{ steps.build.outcome }}) Build:"
            echo "cmake --build --preset ${{ matrix.name }}"
            echo ""
            if [ "${{ steps.test.outcome }}" = "skipped" ]; then
              echo "# $(s ${{ steps.test.outcome }}) Test skipped"
            else
              echo "# $(s ${{ steps.test.outcome }}) Test:"
              echo "ctest --preset ${{ matrix.name }}"
            fi
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"
