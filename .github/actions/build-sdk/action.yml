name: Build openDAQ SDK
description: Configure, build and test openDAQ SDK

inputs:
  additional-dependencies:
    description: 'Additional packages to install (apt on Linux, choco on Windows)'
    required: false
    default: ''
  cmake-generator:
    description: 'CMake generator (e.g., "Ninja", "Visual Studio 17 2022")'
    required: false
    default: ''
  cmake-config-preset:
    description: 'CMake configure preset name'
    required: false
    default: ''
  cmake-config-args:
    description: 'Additional CMake configure arguments (e.g., -D flags)'
    required: false
    default: ''
  cmake-build-type:
    description: 'Build configuration (Release, Debug). Required for multi-config generators (Visual Studio)'
    required: false
    default: ''
  enable-tests:
    description: 'Run tests after build'
    required: false
    default: 'false'
  python-versions:
    description: 'Python version(s) to install (space-separated for multiple versions)'
    required: false
    default: ''
  ctest-exclude-regex:
    description: 'Regular expression to exclude tests from running'
    required: false
    default: ''

outputs:
  gtest-xml-path:
    description: 'Path to GTest XML reports directory'
    value: ${{ steps.test.outputs.gtest-xml-path }}

runs:
  using: composite
  steps:
    - name: Check inputs
      shell: bash
      env:
        CMAKE_GENERATOR: ${{ inputs.cmake-generator }}
      run: |
        if [ -z "$CMAKE_GENERATOR" ]; then
          echo "::error::✗ The cmake-generator input is not set."
          exit 1
        fi

    - name: Set up Python
      if: runner.os != 'Linux'
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Setup cmake
      uses: jwlawson/actions-setup-cmake@v2
      with:
        cmake-version: '4.0'

    - name: Install Windows dependencies
      if: runner.os == 'Windows'
      shell: pwsh
      run: choco install nsis ${{ inputs.additional-dependencies }} -y --no-progress

    - name: Install Linux dependencies
      if: runner.os == 'Linux'
      shell: bash
      run: |
        # Use sudo if available (native runner), otherwise run directly (container)
        SUDO=""
        if command -v sudo &> /dev/null; then
          SUDO="sudo"
        fi
        $SUDO apt-get update && $SUDO apt-get install -y --no-install-recommends \
          ${{ inputs.additional-dependencies || '' }} \
          unzip \
          lld curl ccache \
          mono-runtime libmono-system-json-microsoft4.0-cil libmono-system-data4.0-cil \
          libx11-dev libxi-dev libxcursor-dev libxrandr-dev libgl-dev libudev-dev libfreetype6-dev

    - name: Calculate ccache key
      if: runner.os == 'Linux'
      id: ccache-key
      shell: bash
      run: |
        CCACHE_DIR="${{ github.workspace }}/.ccache"
        HASH=$(echo "${{ inputs.cmake-config-args }}" | sha256sum | cut -d' ' -f1 | head -c 16)
        echo "hash=$HASH" >> "$GITHUB_OUTPUT"
        echo "dir=$CCACHE_DIR" >> "$GITHUB_OUTPUT"
        echo "CCACHE_DIR=$CCACHE_DIR" >> "$GITHUB_ENV"

    - name: Setup ccache
      if: runner.os == 'Linux'
      uses: actions/cache@v4
      with:
        path: ${{ steps.ccache-key.outputs.dir }}
        key: ccache-linux-${{ inputs.cmake-build-type }}-${{ steps.ccache-key.outputs.hash }}-${{ github.sha }}
        restore-keys: |
          ccache-linux-${{ inputs.cmake-build-type }}-${{ steps.ccache-key.outputs.hash }}-
          ccache-linux-${{ inputs.cmake-build-type }}-

    - name: Configure ccache
      if: runner.os == 'Linux'
      shell: bash
      run: |
        ccache --set-config=cache_dir="$CCACHE_DIR"
        ccache --set-config=max_size=2G
        ccache --set-config=compression=true
        ccache -z  # Zero statistics

    - name: Install ninja-build
      if: inputs.cmake-generator == 'Ninja' && runner.os != 'Linux'
      uses: seanmiddleditch/gha-setup-ninja@v5

    # https://github.com/actions/runner-images/issues/10001
    - name: Setup MSVC toolchain
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install Python dependencies
      if: runner.os != 'Linux'
      shell: bash
      run: |
        PYTHON_VERSION=$(python --version)
        echo "Installing numpy for Python versions: $PYTHON_VERSION"
        python -m pip install numpy
        echo "Done installing Python dependencies"

    - name: Configure
      id: cmake-config
      shell: bash
      env:
        CMAKE_BUILD_TYPE: ${{ inputs.cmake-build-type }}
        CMAKE_GENERATOR: ${{ inputs.cmake-generator }}
        CI_GIT_BRANCH: ${{ github.head_ref }}
      run: |
        CMAKE_BUILD_PATH="build"
        mkdir -p "$CMAKE_BUILD_PATH"
        CMAKE_BUILD_PATH=$(cd "$CMAKE_BUILD_PATH" && pwd)
        echo "build-path=$CMAKE_BUILD_PATH" >> "$GITHUB_OUTPUT"

        CMAKE_ARGS=""
        if [ -n "${{ inputs.cmake-config-preset }}" ]; then
          CMAKE_ARGS="--preset ${{ inputs.cmake-config-preset }}"
        fi

        # Visual Studio specific options
        if [[ "$CMAKE_GENERATOR" == "Visual Studio"* ]]; then
          CMAKE_ARGS="$CMAKE_ARGS -DOPENDAQ_MSVC_SINGLE_PROCESS_BUILD=ON"
        fi

        if [ -n "$CMAKE_BUILD_TYPE" ]; then
          CMAKE_ARGS="$CMAKE_ARGS -DCMAKE_BUILD_TYPE=$CMAKE_BUILD_TYPE"
        fi

        CMAKE_ARGS="$CMAKE_ARGS -DCI_GIT_BRANCH=$CI_GIT_BRANCH"

        echo "::group::CMake Configure"
        cmake -B "$CMAKE_BUILD_PATH" -G "$CMAKE_GENERATOR" $CMAKE_ARGS ${{ inputs.cmake-config-args }}
        echo "::endgroup::"

    - name: Build
      shell: bash
      env:
        SHORT_SHA: ci # .NET bindings version suffix (e.g., 1.0.0-beta-ci)
        CMAKE_BUILD_TYPE: ${{ inputs.cmake-build-type }}
        CMAKE_BUILD_PATH: ${{ steps.cmake-config.outputs.build-path }}
      run: |
        CMAKE_BUILD_ARGS=""
        if [ -n "$CMAKE_BUILD_TYPE" ]; then
          CMAKE_BUILD_ARGS="--config $CMAKE_BUILD_TYPE"
        fi

        echo "::group::CMake Build"
        cmake --build "$CMAKE_BUILD_PATH" $CMAKE_BUILD_ARGS
        echo "::endgroup::"

    - name: Show ccache statistics
      if: runner.os == 'Linux'
      shell: bash
      run: |
        echo "::group::ccache statistics"
        ccache -s
        echo "::endgroup::"

    - name: Test
      id: test
      if: inputs.enable-tests == 'true'
      shell: bash
      env:
        CMAKE_BUILD_TYPE: ${{ inputs.cmake-build-type }}
        CMAKE_BUILD_PATH: ${{ steps.cmake-config.outputs.build-path }}
        CTEST_EXCLUDE_REGEX: ${{ inputs.ctest-exclude-regex }}
      run: |
        GTEST_XML_PATH="$CMAKE_BUILD_PATH/test_results"
        mkdir -p "$GTEST_XML_PATH"

        if command -v cygpath &> /dev/null; then
          GTEST_XML_PATH=$(cygpath -w "$GTEST_XML_PATH")
        fi

        export GTEST_OUTPUT="xml:$GTEST_XML_PATH/"
        echo "gtest-xml-path=$GTEST_XML_PATH" >> "$GITHUB_OUTPUT"

        CTEST_ARGS=""
        if [ -n "$CMAKE_BUILD_TYPE" ]; then
          CTEST_ARGS="--build-config $CMAKE_BUILD_TYPE"
        fi
        if [ -n "$CTEST_EXCLUDE_REGEX" ]; then
          CTEST_ARGS="$CTEST_ARGS --exclude-regex $CTEST_EXCLUDE_REGEX"
        fi

        echo "::group::CTest"
        # TODO: Remove this if statement
        # On Linux, run with sudo to allow raw sockets (ICMP ping for reachability tests)
        if [[ "$RUNNER_OS" == "Linux" ]] && command -v sudo &> /dev/null; then
          sudo -E ctest --test-dir "$CMAKE_BUILD_PATH" --preset run_tests --output-on-failure $CTEST_ARGS
        else
          ctest --test-dir "$CMAKE_BUILD_PATH" --preset run_tests --output-on-failure $CTEST_ARGS
        fi
        echo "::endgroup::"
