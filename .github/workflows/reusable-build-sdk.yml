name: Build openDAQ SDK

on:
  workflow_call:
    inputs:
      build-id:
        description: 'Unique identifier for this build job'
        required: false
        type: string
        default: ''
      ref:
        description: 'Branch, tag, or commit SHA to checkout'
        required: false
        type: string
        default: 'main'
      path:
        description: 'Path where to checkout the repository'
        required: false
        type: string
        default: '.'
      runner:
        description: 'Runner to use for the build'
        required: false
        type: string
        default: 'windows-latest'
      cmake-generator-name:
        description: 'CMake generator name (e.g., "Ninja", "Visual Studio 17 2022")'
        required: false
        type: string
        default: 'Ninja'
      cmake-preset-name:
        description: 'CMake preset name (e.g., "package", "ci")'
        required: false
        type: string
        default: ''
      cmake-compiler:
        description: 'CMake compiler configuration'
        required: false
        type: string
        default: ''
      cmake-config-args:
        description: 'Additional CMake configure arguments'
        required: false
        type: string
        default: ''
      cmake-build-args:
        description: 'Additional CMake build arguments'
        required: false
        type: string
        default: ''
      ctest-enable:
        description: 'Run tests after build'
        required: false
        type: boolean
        default: false
      ctest-output-on-failure:
        description: 'Output test output on failure (false = use preset setting)'
        required: false
        type: boolean
        default: false
      ctest-preset:
        description: 'CTest preset name (e.g., "run_tests")'
        required: false
        type: string
        default: ''
      ctest-tests-regex:
        description: 'Run only tests matching regex'
        required: false
        type: string
        default: ''
      ctest-exclude-regex:
        description: 'Exclude tests matching regex'
        required: false
        type: string
        default: ''
      ctest-args:
        description: 'Additional CTest arguments'
        required: false
        type: string
        default: ''
      gtest-output-xml-path:
        description: 'GTest XML output directory (empty = disabled)'
        required: false
        type: string
        default: ''
      cpack-generator-name:
        description: 'CPack generator name (e.g., "DEB", "NSIS", "TGZ", "ZIP")'
        required: false
        type: string
        default: ''
      ccache-enable:
        description: 'Enable compiler cache (works best with Ninja generator)'
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ${{ inputs.runner }}

    steps:
      - name: Setup cmake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '4.0'

      - name: Checkout CI workflows
        uses: actions/checkout@v4

      - name: Setup dependencies
        uses: ./.github/actions/setup-dependencies

      - name: Checkout openDAQ
        if: inputs.path != '.'
        uses: actions/checkout@v4
        with:
          repository: openDAQ/openDAQ
          ref: ${{ inputs.ref }}
          path: ${{ inputs.path }}

      - name: Build SDK
        id: build
        uses: ./.github/actions/build-sdk
        with:
          source-path: ${{ inputs.path }}
          cmake-generator-name: ${{ inputs.cmake-generator-name }}
          cmake-preset-name: ${{ inputs.cmake-preset-name }}
          cmake-compiler: ${{ inputs.cmake-compiler }}
          cmake-config-args: ${{ inputs.cmake-config-args }}
          cmake-build-args: ${{ inputs.cmake-build-args }}
          ctest-enable: ${{ inputs.ctest-enable }}
          ctest-output-on-failure: ${{ inputs.ctest-output-on-failure }}
          ctest-preset: ${{ inputs.ctest-preset }}
          ctest-tests-regex: ${{ inputs.ctest-tests-regex }}
          ctest-exclude-regex: ${{ inputs.ctest-exclude-regex }}
          ctest-args: ${{ inputs.ctest-args }}
          gtest-output-xml-path: ${{ inputs.gtest-output-xml-path }}
          cpack-generator-name: ${{ inputs.cpack-generator-name }}
          ccache-enable: ${{ inputs.ccache-enable }}


      - name: Compose openDAQ framework filename
        if: inputs.cpack-generator-name != ''
        id: opendaq-filename
        uses: openDAQ/actions/framework-compose-filename@jira/TBBAS-2672-opendaq-gh-actions-architecture
        with:
          version: ${{ steps.build.outputs.version }}-${{ steps.build.outputs.commit-hash }}
          packaging: ${{ inputs.cpack-generator-name }}

      - name: Prepare artifact
        if: inputs.cpack-generator-name != ''
        shell: bash
        env:
          ARTIFACT_FILENAME: ${{ steps.opendaq-filename.outputs.filename }}
          PACKAGE_PATH: ${{ steps.build.outputs.package-path-unix }}
          CPACK_GENERATOR: ${{ inputs.cpack-generator-name }}
        run: |
          echo "Preparing Artifact:"
          echo "  Target: $ARTIFACT_FILENAME"
          echo ""

          # Determine file extension based on CPack generator
          case "$CPACK_GENERATOR" in
            DEB)
              PACKAGE_EXT="deb"
              ;;
            NSIS)
              PACKAGE_EXT="exe"
              ;;
            TGZ)
              PACKAGE_EXT="tar.gz"
              ;;
            ZIP)
              PACKAGE_EXT="zip"
              ;;
            *)
              echo "::warning::Unknown CPack generator '$CPACK_GENERATOR', using wildcard pattern"
              PACKAGE_EXT="*"
              ;;
          esac

          SEARCH_PATTERN="opendaq*.$PACKAGE_EXT"

          echo "::group::Searching for package file"
          echo "Search directory: $PACKAGE_PATH"
          echo "Search pattern: $SEARCH_PATTERN"
          ls -lah "$PACKAGE_PATH/" || echo "Directory not found or empty"
          echo "::endgroup::"

          PACKAGE_FILE=$(find "$PACKAGE_PATH" -type f -iname "$SEARCH_PATTERN" | head -n1)

          if [ -z "$PACKAGE_FILE" ]; then
            echo "::error::No package file found matching pattern '$SEARCH_PATTERN' in $PACKAGE_PATH"
            exit 1
          fi

          echo "Found: $PACKAGE_FILE ($(du -h "$PACKAGE_FILE" | cut -f1))"

          cp "$PACKAGE_FILE" "./$ARTIFACT_FILENAME"

          if [ -z "./$ARTIFACT_FILENAME" ]; then
            echo "::error::Failed to copy artifact from '$PACKAGE_FILE' to '$ARTIFACT_FILENAME'"
            exit 1
          fi

          echo "✓ Artifact prepared successfully"
          ls -lh "./$ARTIFACT_FILENAME"

      - name: Upload artifact
        if: inputs.cpack-generator-name != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.opendaq-filename.outputs.filename }}
          path: ${{ steps.opendaq-filename.outputs.filename }}
          retention-days: 30

      - name: Upload test reports
        if: always() && inputs.ctest-enable && inputs.gtest-output-xml-path != ''
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ inputs.build-id != '' && inputs.build-id || inputs.runner }}
          path: ${{ steps.build.outputs.gtest-xml-report-path-windows != '' && steps.build.outputs.gtest-xml-report-path-windows || steps.build.outputs.gtest-xml-report-path-unix }}
          retention-days: 7
          if-no-files-found: warn
