name: Build Python Wheels
description: Build Python wheels for multiple Python versions (requires prior CMake configuration)

inputs:
  python-versions:
    description: 'Space-separated list of Python versions (e.g., "3.9 3.10 3.11")'
    required: false
    default: '3.9 3.10 3.11 3.12 3.13 3.14'
  build-path:
    description: 'Path to build directory (must be already configured with CMake)'
    required: false
    default: 'build'
  cmake-build-type:
    description: 'Build type (Release/Debug)'
    required: false
    default: 'Release'

outputs:
  wheels-path:
    description: 'Path to built wheels'
    value: ${{ steps.build-wheels.outputs.wheels-path }}

runs:
  using: composite
  steps:
    - name: Convert versions to newline format
      id: versions
      shell: bash
      run: |
        VERSIONS="${{ inputs.python-versions }}"
        echo "newline-versions<<EOF" >> $GITHUB_OUTPUT
        echo "$VERSIONS" | tr ' ' '\n' >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Set up Python versions
      uses: actions/setup-python@v5
      with:
        python-version: ${{ steps.versions.outputs.newline-versions }}

    - name: Build wheels
      id: build-wheels
      shell: bash
      run: |
        BUILD_PATH="${{ inputs.build-path }}"
        # Convert Windows path to unix if needed
        if command -v cygpath &> /dev/null; then
          BUILD_PATH=$(cygpath -u "$BUILD_PATH")
        fi
        CMAKE_BUILD_TYPE="${{ inputs.cmake-build-type }}"
        PYTHON_VERSIONS="${{ inputs.python-versions }}"

        WHEELS_PATH="$BUILD_PATH/wheels"
        mkdir -p "$WHEELS_PATH"
        WHEELS_PATH="$(cd "$WHEELS_PATH" && pwd)"

        if command -v cygpath &> /dev/null; then
          echo "wheels-path=$(cygpath -w "$WHEELS_PATH")" >> $GITHUB_OUTPUT
        else
          echo "wheels-path=$WHEELS_PATH" >> $GITHUB_OUTPUT
        fi

        read -ra versions <<< "$PYTHON_VERSIONS"

        # Select highest Python version for running build_pip.py script
        # (needs Python 3.9+ for str.removesuffix)
        BUILD_PYTHON_VERSION=$(echo "$PYTHON_VERSIONS" | tr ' ' '\n' | sort -V | tail -1)
        echo "Using Python $BUILD_PYTHON_VERSION for build_pip.py"

        # Platform-specific settings
        PYTHON_VENV_PATH="$BUILD_PATH/venv"
        if [[ "$RUNNER_OS" == "Windows" ]]; then
          PYTHON_VENV_ACTIVATE="$PYTHON_VENV_PATH/Scripts/activate"
          PYTHON_CMD="py -"  # py -3.11
          BIN_PATH="$BUILD_PATH/bin/$CMAKE_BUILD_TYPE"  # multi-config generator
        else
          PYTHON_VENV_ACTIVATE="$PYTHON_VENV_PATH/bin/activate"
          PYTHON_CMD="python"  # python3.11
          BIN_PATH="$BUILD_PATH/bin"  # single-config generator
        fi

        for version in "${versions[@]}"; do
          echo "::group::Building wheel for Python $version"

          # Reconfigure CMake with new Python version and enable bindings
          cmake -B "$BUILD_PATH" \
            -DOPENDAQ_GENERATE_PYTHON_BINDINGS=ON \
            -DOPENDAQ_PYTHON_VERSION="$version" \
            -DPYBIND11_FINDPYTHON=ON

          # Build py_opendaq_daq target
          cmake --build "$BUILD_PATH" --config "$CMAKE_BUILD_TYPE" --target py_opendaq_daq

          # Create venv with target Python version (for pybind11-stubgen to import the module)
          rm -rf "$PYTHON_VENV_PATH"
          ${PYTHON_CMD}${version} -m venv "$PYTHON_VENV_PATH"
          source "$PYTHON_VENV_ACTIVATE"

          pip install --quiet numpy pybind11-stubgen

          # Build wheel using highest Python version (-r removes .pyd after packaging)
          # stubgen from venv is used via subprocess (needs target Python to import module)
          ${PYTHON_CMD}${BUILD_PYTHON_VERSION} bindings/python/package/build_pip.py -l "$BIN_PATH" -r

          cp pip/packages/*.whl "$WHEELS_PATH/"

          deactivate
          rm -rf "$PYTHON_VENV_PATH"

          echo "::endgroup::"
        done

        echo "Built wheels:"
        ls -la "$WHEELS_PATH/"
