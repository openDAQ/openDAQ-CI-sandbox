name: Stage LTStreamingModulesModern

on:
  workflow_dispatch:

env:
  project_org: openDAQ
  project_repo: LTStreamingModulesModern
  project_ref: ci/staging

jobs:
  resolve:
    name: Resolve source SHA
    runs-on: ubuntu-latest
    outputs:
      org: ${{ env.project_org }}
      repo: ${{ env.project_repo }}
      ref: ${{ env.project_ref }}
      sha: ${{ steps.resolve.outputs.sha }}
    steps:
      - name: Resolve source SHA
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(gh api "repos/${{ env.project_org }}/${{ env.project_repo }}/commits/${{ env.project_ref }}" --jq '.sha')
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Resolved ${{ env.project_org }}/${{ env.project_repo }}@${{ env.project_ref }} -> $SHA"

  ci:
    needs: resolve
    name: LTModern-Build
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/reusable.yml
    with:
      project-org: ${{ needs.resolve.outputs.org }}
      project-repo: ${{ needs.resolve.outputs.repo }}
      project-ref: ${{ needs.resolve.outputs.ref }}
      timeout: '[{"timeout-minutes": 270}]'
      include-jobs: >
        [
          "macos-26-x86_64-ninja-appleclang-release"
        ]
      cmake-presets: >
        [
          {
            "match-jobs": ["macos-*"],
            "configure-preset": "module",
            "cache-variables": {
              "DAQMODULES_LT_STREAMING_ENABLE_TESTS": "OFF",
              "CMAKE_OSX_DEPLOYMENT_TARGET": "10.15",
              "CMAKE_PREFIX_PATH": "${sourceDir}/staging-deps/opt/opendaq"
            },
            "staging": true
          }
        ]
      packages: >
        [
          {
            "match-jobs": ["macos-*"],
            "staging": [
              {
                "dir": "staging-deps",
                "images": ["ghcr.io/opendaq/sandbox/staging-macos-26-x86_64-ninja-appleclang-release:fece4a92d1261da510202387573c6cb0483e745d"]
              }
            ]
          }
        ]
