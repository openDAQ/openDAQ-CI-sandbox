name: Build openDAQ packages


on:
  push:
    branches: [release/**]

  workflow_dispatch:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

  workflow_call:
    inputs:
      cmake_preset:
        required: false
        type: string
      ctest_preset:
        required: false
        type: string

env:
  cmake_preset: package
  python_versions: 3.8 3.9 3.10 3.11 3.12 3.13 3.14
  windows_x64_artifact: SdkWindows64

jobs:
  package_windows:
    runs-on: ${{ matrix.runner }}
    name: ${{ matrix.name }}

    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-${{ matrix.name }}
      cancel-in-progress: true
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        # https://docs.github.com/en/actions/using-github-hosted-runners/about-github-hosted-runners
        include:
          - name: Windows VS 2022 x64 Release
            runner: windows-latest
            cmake-generator: "Visual Studio 17 2022"
            cmake-generator-platform: x64
            cmake-build-type: Release
            cmake-defines: >-
              -DOPENDAQ_MSVC_SINGLE_PROCESS_BUILD=ON
              -DOPENDAQ_ENABLE_TESTS=OFF
              -DOPENDAQ_BUILD_DOCUMENTATION=OFF
              -DOPENDAQ_GENERATE_PYTHON_BINDINGS=OFF
              -DOPENDAQ_ENABLE_OPCUA=OFF
              -DOPENDAQ_ENABLE_WEBSOCKET_STREAMING=OFF
              -DOPENDAQ_ENABLE_NATIVE_STREAMING=OFF
              -DDAQSIMULATOR_ENABLE_SIMULATOR_APP=OFF
              -DDAQMODULES_REF_FB_MODULE=OFF
              -DDAQMODULES_REF_DEVICE_MODULE=OFF
              -DDAQMODULES_AUDIO_DEVICE_MODULE=OFF
              -DDAQMODULES_OPENDAQ_CLIENT_MODULE=OFF
              -DDAQMODULES_OPENDAQ_SERVER_MODULE=OFF
              -DDAQMODULES_BASIC_CSV_RECORDER_MODULE=OFF
            cpack: NSIS
            disable-ccache: true
            enable-32bit: false

          - name: Windows VS 2022 Win32 Release
            runner: windows-latest
            cmake-generator: "Visual Studio 17 2022"
            cmake-generator-platform: Win32
            cmake-build-type: Release
            cmake-defines: >-
              -DOPENDAQ_MSVC_SINGLE_PROCESS_BUILD=ON
              -DOPENDAQ_ENABLE_TESTS=OFF
              -DOPENDAQ_BUILD_DOCUMENTATION=OFF
              -DOPENDAQ_GENERATE_PYTHON_BINDINGS=OFF
              -DOPENDAQ_ENABLE_OPCUA=OFF
              -DOPENDAQ_ENABLE_WEBSOCKET_STREAMING=OFF
              -DOPENDAQ_ENABLE_NATIVE_STREAMING=OFF
              -DDAQSIMULATOR_ENABLE_SIMULATOR_APP=OFF
              -DDAQMODULES_REF_FB_MODULE=OFF
              -DDAQMODULES_REF_DEVICE_MODULE=OFF
              -DDAQMODULES_AUDIO_DEVICE_MODULE=OFF
              -DDAQMODULES_OPENDAQ_CLIENT_MODULE=OFF
              -DDAQMODULES_OPENDAQ_SERVER_MODULE=OFF
              -DDAQMODULES_BASIC_CSV_RECORDER_MODULE=OFF
            cpack: NSIS
            disable-ccache: true
            enable-32bit: true

    outputs:
      # trick for reusable workflow in dotnet_bindings because cannot use env context in "with:"
      # test_path: ''
      windows_x64_artifact_name: ${{ env.windows_x64_artifact }}
      # short_sha: ${{ env.short_sha }}
      short_sha_dotnet: ${{ steps.build_wheels.outputs.short_sha_dotnet }}

    env:
      short_sha: 'package'  # for .NET Bindings build

    steps:
      # TODO: Remove these 3 steps before merging to openDAQ/openDAQ
      - name: Checkout openDAQ
        if: github.repository != 'openDAQ/openDAQ'
        uses: actions/checkout@v4
        with:
          repository: openDAQ/openDAQ

      - name: Checkout CI actions
        if: github.repository != 'openDAQ/openDAQ'
        uses: actions/checkout@v4
        with:
          path: _ci-sandbox

      - name: Copy CI actions
        if: github.repository != 'openDAQ/openDAQ'
        shell: bash
        run: cp -r _ci-sandbox/.github/actions .github/

      - name: Apply patches
        if: github.repository != 'openDAQ/openDAQ'
        shell: bash
        run: |
          if [ ! -d "_ci-sandbox/.github/patches" ]; then
            echo "No patches directory, nothing to apply"
            exit 0
          fi
          for patch in _ci-sandbox/.github/patches/*.patch; do
            [ -f "$patch" ] && git apply "$patch" && echo "Applied: $patch" || true
          done

      - name: Setup ccache
        if: ${{ matrix.disable-ccache != true }}
        uses: openDAQ/openDAQ-CI-sandbox/.github/actions/ccache-setup@actions/ccache-setup
        with:
          cmake-config-args: ${{ matrix.cmake-defines }}
          cmake-build-type: ${{ matrix.cmake-build-type }}
          target-arch: ${{ matrix.enable-32bit == true && 'x86-32' || '' }}

      # TODO: End of sandbox-only steps

      - name: Build SDK
        id: build-sdk
        uses: ./.github/actions/build-sdk
        with:
          additional-dependencies: nsis
          cmake-generator: ${{ matrix.cmake-generator }}
          cmake-config-preset: ${{ env.cmake_preset }}
          cmake-config-args: ${{ matrix.cmake-defines }}
          cmake-build-type: ${{ matrix.cmake-build-type }}
          enable-32bit: ${{ matrix.enable-32bit == true }}

      - name: Build Wheels
        id: build-wheels
        if: matrix.enable-32bit != true
        uses: ./.github/actions/build-wheels
        with:
          python-versions: ${{ env.python_versions }}
          build-path: ${{ steps.build-sdk.outputs.build-path }}
          cmake-build-type: ${{ matrix.cmake-build-type }}

      - name: Set short_sha_dotnet
        id: build_wheels
        if: matrix.enable-32bit != true
        shell: bash
        run: |
          # for .NET Bindings beta build
          BRANCH="${{ github.base_ref || github.ref_name }}"
          BRANCH="${BRANCH#refs/heads/}"
          if [[ "$BRANCH" != release/* ]]; then
            echo "short_sha_dotnet=${{ env.short_sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Package
        id: package
        shell: bash
        env:
          BUILD_PATH: ${{ steps.build-sdk.outputs.build-path }}
        run: |
          PACKAGE_PATH="$BUILD_PATH/_packages"
          cpack -B "$PACKAGE_PATH" -C ${{ matrix.cmake-build-type }} -G ${{ matrix.cpack }}

          # Find package file and extract base name
          PACKAGE_FILE=$(ls -1 "$PACKAGE_PATH"/*.exe 2>/dev/null | head -1)
          ARTIFACT_BASE=$(basename "${PACKAGE_FILE%.exe}")
          # Convert to lowercase
          ARTIFACT_BASE="${ARTIFACT_BASE,,}"

          # Rename files to lowercase
          for f in "$PACKAGE_PATH"/*.exe "$PACKAGE_PATH"/*.nupkg 2>/dev/null; do
            [ -f "$f" ] && mv "$f" "${f,,}"
          done

          echo "artifact_base=$ARTIFACT_BASE" >> $GITHUB_OUTPUT
          echo "package_path=$PACKAGE_PATH" >> $GITHUB_OUTPUT
          echo "Artifact base name: $ARTIFACT_BASE"

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.artifact_base }}
          path: ${{ steps.package.outputs.package_path }}
          retention-days: 7

      - name: Upload Wheels
        if: matrix.enable-32bit != true
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.artifact_base }}-wheels
          path: ${{ steps.build-wheels.outputs.wheels-path }}
          retention-days: 7

      - name: Upload binaries for .NET Bindings NuGet package
        # "There can be only one for now."
        if: matrix.name == 'Windows VS 2022 x64 Release'
        env:
          dotnetBuildPath: ${{ steps.build-sdk.outputs.build-path }}/bindings/CSharp/bin/${{ matrix.cmake-generator-platform }}/${{ matrix.cmake-build-type }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.windows_x64_artifact }}
          path: |
            ${{ env.dotnetBuildPath }}
            !${{ env.dotnetBuildPath }}/**/*.json
          retention-days: 1
