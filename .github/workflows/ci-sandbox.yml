name: Build and Test openDAQ

on:
  workflow_dispatch:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

  workflow_call:
    inputs:
      cmake_preset:
        required: false
        type: string
      ctest_preset:
        required: false
        type: string

env:
  s3_bucket: bb-blueberry-sdk-releases
  regression_tests_target_tag: v3.0.0
  regression_simulator_folder: regression_test_simulator
  cmake_preset: ${{ inputs.cmake_preset != '' && inputs.cmake_preset || 'ci' }}
  ctest_preset: ${{ inputs.ctest_preset != '' && inputs.ctest_preset || 'run_tests' }}
  test_path: ${{ github.workspace }}/junit_reports/
  build_path: ${{ github.workspace }}/build
  package_path: ${{ github.workspace }}/build/_packages/
  dotnet_bin_path: ${{ github.workspace }}/build/bindings/CSharp/bin
  dotnet_test_path: ${{ github.workspace }}/build/bindings/CSharp/test_results
  python_version_build: 3.11
  python_versions: 3.8 3.9 3.10 3.11 3.12 3.13 3.14
  OPENDAQ_SINK_CONSOLE_LOG_LEVEL: 1
  windows_x64_artifact: SdkWindows64
  linux_x64_artifact: SdkLinux64
  nuget_artifact: Packages (openDAQ.Net NuGet)

jobs:
  gcc_info:
    runs-on: windows-latest
    name: GCC Info (Windows)
    steps:
      - name: GCC location and version
        shell: bash
        run: |
          echo "=== WHERE GCC ==="
          where gcc || echo "gcc not found in PATH"
          echo ""
          echo "=== GCC VERSION ==="
          gcc --version
          echo ""
          echo "=== GCC VERBOSE ==="
          gcc -v 2>&1
          echo ""
          echo "=== GCC DUMPMACHINE ==="
          gcc -dumpmachine
          echo ""
          echo "=== GCC PRINT-SEARCH-DIRS ==="
          gcc -print-search-dirs
          echo ""
          echo "=== GCC PRINT-LIBGCC-FILE-NAME ==="
          gcc -print-libgcc-file-name

      - name: MinGW directory structure
        shell: bash
        run: |
          echo "=== C:/mingw64 contents ==="
          ls -la /c/mingw64/ 2>/dev/null || echo "C:/mingw64 not found"
          echo ""
          echo "=== C:/mingw64/bin (first 20) ==="
          ls /c/mingw64/bin/ 2>/dev/null | head -20 || echo "not found"
          echo ""
          echo "=== C:/mingw64/lib (first 20) ==="
          ls /c/mingw64/lib/ 2>/dev/null | head -20 || echo "not found"
          echo ""
          echo "=== C:/mingw64/x86_64-w64-mingw32/lib ==="
          ls /c/mingw64/x86_64-w64-mingw32/lib/ 2>/dev/null | head -20 || echo "not found"

      - name: Check runtime (UCRT vs MSVCRT)
        shell: bash
        run: |
          echo "=== Checking for UCRT ==="
          ls /c/mingw64/x86_64-w64-mingw32/lib/libucrt*.a 2>/dev/null && echo "UCRT libraries found" || echo "No UCRT libraries"
          echo ""
          echo "=== Checking for MSVCRT ==="
          ls /c/mingw64/x86_64-w64-mingw32/lib/libmsvcrt*.a 2>/dev/null && echo "MSVCRT libraries found" || echo "No MSVCRT libraries"
          echo ""
          echo "=== CRT startup objects ==="
          ls /c/mingw64/x86_64-w64-mingw32/lib/crt*.o 2>/dev/null || echo "not found"

      - name: Thread model test
        shell: bash
        run: |
          echo "=== Compile test for thread model ==="
          cat > /tmp/thread_test.cpp << 'EOF'
          #include <iostream>
          #include <thread>
          int main() {
              std::cout << "Thread support: OK" << std::endl;
              return 0;
          }
          EOF
          g++ -v /tmp/thread_test.cpp -o /tmp/thread_test.exe 2>&1 | grep -i "thread\|posix\|win32\|mcf"

      - name: PATH contents
        shell: bash
        run: |
          echo "=== PATH (one per line) ==="
          echo "$PATH" | tr ':' '\n' | grep -i mingw

      - name: Other MinGW installations
        shell: bash
        run: |
          echo "=== Strawberry Perl GCC ==="
          /c/Strawberry/c/bin/gcc.exe --version 2>/dev/null || echo "Strawberry GCC not found"
          echo ""
          echo "=== MSYS2 GCC ==="
          /c/msys64/mingw64/bin/gcc.exe --version 2>/dev/null || echo "MSYS2 GCC not found"
          echo ""
          echo "=== Git MinGW ==="
          "/c/Program Files/Git/mingw64/bin/gcc.exe" --version 2>/dev/null || echo "Git MinGW GCC not found"

  build_windows:
    runs-on: ${{ matrix.runner }}
    name: ${{ matrix.name }}
    # ${{ }} expression syntax because of leading '!'
    # if: ${{ ! github.event.pull_request.draft }}

    concurrency:
      group: ${{ github.workflow }}-${{ github.head_ref }}-${{ matrix.name }}
      cancel-in-progress: true
    timeout-minutes: 270
    strategy:
      fail-fast: false
      matrix:
        # https://docs.github.com/en/actions/using-github-hosted-runners/about-github-hosted-runners
        include:
          # - name: Windows VS 2022 x64 Release
          #   runner: windows-latest
          #   cmake-build-type: Release
          #   cmake-defines: -DDAQMODULES_PARQUET_RECORDER_MODULE=ON
          #   cmake-generator: "Visual Studio 17 2022"
          # - name: Windows VS 2022 x64 Debug
          #   runner: windows-latest
          #   cmake-build-type: Debug
          #   cmake-defines:
          #   cmake-generator: "Visual Studio 17 2022"
          # - name: Windows VS 2022 Win32 Release
          #   runner: windows-latest
          #   cmake-build-type: Release
          #   cmake-defines: -A Win32
          #   cmake-generator: "Visual Studio 17 2022"
          #   enable-32bit: true
          # - name: Windows Clang Release
          #   runner: windows-latest
          #   cmake-build-type: Release
          #   cmake-defines: -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++
          #   cmake-generator: Ninja
          - name: Windows GCC Release
            runner: windows-latest
            cmake-build-type: Release
            cmake-defines: >-
              -DCMAKE_C_COMPILER=gcc
              -DCMAKE_CXX_COMPILER=g++
              -DCMAKE_C_COMPILER_LAUNCHER=ccache
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
              "-DCMAKE_CXX_FLAGS=-Wno-deprecated-declarations -Wno-overloaded-virtual -Wa,-mbig-obj -Wno-error=conversion-null"
              "-DCMAKE_C_FLAGS=-Wa,-mbig-obj"
              -DOPENDAQ_ENABLE_WEBSOCKET_STREAMING=OFF
            cmake-generator: Ninja
            disable-ccache: true
            enable-32bit: false
          - name: Windows GCC Release (MSYS2 MINGW64)
            runner: windows-latest
            cmake-build-type: Release
            cmake-defines: >-
              -DCMAKE_C_COMPILER=gcc
              -DCMAKE_CXX_COMPILER=g++
              -DCMAKE_C_COMPILER_LAUNCHER=ccache
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
              "-DCMAKE_CXX_FLAGS=-Wno-deprecated-declarations -Wno-overloaded-virtual -Wa,-mbig-obj -Wno-error=conversion-null"
              "-DCMAKE_C_FLAGS=-Wa,-mbig-obj"
              -DOPENDAQ_ENABLE_WEBSOCKET_STREAMING=OFF
            cmake-generator: Ninja
            disable-ccache: true
            enable-32bit: false
            use-msys-setup: true
            msys-msystem: MINGW64
            msys-install: mingw-w64-x86_64-crt-git mingw-w64-x86_64-gcc mingw-w64-x86_64-ninja mingw-w64-x86_64-ccache
            msys-path: D:/a/_temp/msys64/mingw64/bin
          - name: Windows GCC Release (MSYS2 UCRT64)
            runner: windows-latest
            cmake-build-type: Release
            cmake-defines: >-
              -DCMAKE_C_COMPILER=gcc
              -DCMAKE_CXX_COMPILER=g++
              -DCMAKE_C_COMPILER_LAUNCHER=ccache
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
              "-DCMAKE_CXX_FLAGS=-Wno-deprecated-declarations -Wno-overloaded-virtual -Wa,-mbig-obj -Wno-error=conversion-null"
              "-DCMAKE_C_FLAGS=-Wa,-mbig-obj"
              -DOPENDAQ_ENABLE_WEBSOCKET_STREAMING=OFF
            cmake-generator: Ninja
            disable-ccache: true
            enable-32bit: false
            use-msys-setup: true
            msys-msystem: UCRT64
            msys-install: mingw-w64-ucrt-x86_64-crt-git mingw-w64-ucrt-x86_64-gcc mingw-w64-ucrt-x86_64-ninja mingw-w64-ucrt-x86_64-ccache
            msys-path: D:/a/_temp/msys64/ucrt64/bin
          - name: Windows GCC Release (skip hanging)
            runner: windows-latest
            cmake-build-type: Release
            cmake-defines: >-
              -DCMAKE_C_COMPILER=gcc
              -DCMAKE_CXX_COMPILER=g++
              -DCMAKE_C_COMPILER_LAUNCHER=ccache
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
              "-DCMAKE_CXX_FLAGS=-Wno-deprecated-declarations -Wno-overloaded-virtual -Wa,-mbig-obj -Wno-error=conversion-null"
              "-DCMAKE_C_FLAGS=-Wa,-mbig-obj"
              -DOPENDAQ_ENABLE_WEBSOCKET_STREAMING=OFF
            cmake-generator: Ninja
            disable-ccache: true
            enable-32bit: false
            ctest-exclude: test_bcrypt
          - name: Windows GCC Release (niXman MSVCRT)
            runner: windows-latest
            cmake-build-type: Release
            cmake-defines: >-
              -DCMAKE_C_COMPILER=gcc
              -DCMAKE_CXX_COMPILER=g++
              -DCMAKE_C_COMPILER_LAUNCHER=ccache
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
              "-DCMAKE_CXX_FLAGS=-Wno-deprecated-declarations -Wno-overloaded-virtual -Wa,-mbig-obj -Wno-error=conversion-null"
              "-DCMAKE_C_FLAGS=-Wa,-mbig-obj"
              -DOPENDAQ_ENABLE_WEBSOCKET_STREAMING=OFF
            cmake-generator: Ninja
            disable-ccache: true
            enable-32bit: false
            use-nixman-msvcrt: true

    steps:
      # TODO: Remove these 3 steps before merging to openDAQ/openDAQ
      - name: Checkout openDAQ
        if: github.repository != 'openDAQ/openDAQ'
        uses: actions/checkout@v4
        with:
          repository: openDAQ/openDAQ

      - name: Checkout CI actions
        if: github.repository != 'openDAQ/openDAQ'
        uses: actions/checkout@v4
        with:
          path: _ci-sandbox

      - name: Copy CI actions
        if: github.repository != 'openDAQ/openDAQ'
        shell: bash
        run: cp -r _ci-sandbox/.github/actions .github/

      - name: Apply patches
        if: github.repository != 'openDAQ/openDAQ'
        shell: bash
        run: |
          for patch in _ci-sandbox/.github/patches/*.patch; do
            [ -f "$patch" ] && git apply "$patch" && echo "Applied: $patch"
          done

      - name: Install niXman MinGW MSVCRT
        if: ${{ matrix.use-nixman-msvcrt == true }}
        shell: bash
        run: |
          echo "Downloading niXman MinGW 15.2.0 with MSVCRT..."
          curl -L -o mingw-msvcrt.7z "https://github.com/niXman/mingw-builds-binaries/releases/download/15.2.0-rt_v13-rev0/x86_64-15.2.0-release-posix-seh-msvcrt-rt_v13-rev0.7z"
          echo "Extracting to D:/mingw-msvcrt..."
          7z x mingw-msvcrt.7z -oD:/ -y
          mv D:/mingw64 D:/mingw-msvcrt
          echo "D:/mingw-msvcrt/bin" >> $GITHUB_PATH
          echo "Installed GCC version:"
          D:/mingw-msvcrt/bin/gcc.exe --version
          # Create libssp stubs (niXman builds also use --disable-libssp)
          GCC_LIB_PATH=$(dirname "$(D:/mingw-msvcrt/bin/gcc.exe -print-libgcc-file-name)")
          echo "Creating libssp stubs in $GCC_LIB_PATH"
          ar rcs "$GCC_LIB_PATH/libssp.a"
          ar rcs "$GCC_LIB_PATH/libssp_nonshared.a"

      - name: Create libssp stubs
        if: ${{ matrix.use-msys-setup != true && matrix.use-nixman-msvcrt != true }}
        shell: bash
        run: |
          # Find GCC library path (directory containing libgcc)
          GCC_LIB_PATH=$(dirname "$(gcc -print-libgcc-file-name)")
          echo "GCC library path: $GCC_LIB_PATH"
          # Create empty dummy archives (same approach as MSYS2 PR #13405)
          # This satisfies linker when it adds -lssp -lssp_nonshared
          ar rcs "$GCC_LIB_PATH/libssp.a"
          ar rcs "$GCC_LIB_PATH/libssp_nonshared.a"
          echo "Created dummy libssp stubs in $GCC_LIB_PATH"
          ls -la "$GCC_LIB_PATH/libssp"* || echo "No libssp files found"

      - name: Setup MSYS2
        if: ${{ matrix.use-msys-setup == true }}
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msys-msystem }}
          update: false
          install: ${{ matrix.msys-install }}
          path-type: inherit

      - name: Add MSYS2 to PATH
        if: ${{ matrix.msys-path != '' }}
        shell: bash
        run: |
          echo "${{ matrix.msys-path }}" >> $GITHUB_PATH
          echo "Added ${{ matrix.msys-path }} to PATH"

      - name: Verify libssp.a
        if: ${{ matrix.use-msys-setup == true }}
        shell: msys2 {0}
        run: |
          echo "libssp files:"
          ls -la /${{ matrix.msys-msystem == 'UCRT64' && 'ucrt64' || 'mingw64' }}/lib/libssp* 2>/dev/null || echo "No libssp files found"
          echo "GCC search path:"
          gcc -print-file-name=libssp.a

      - name: Find libssp path
        if: ${{ matrix.use-msys-setup == true }}
        id: find-libssp
        shell: msys2 {0}
        run: |
          LIBSSP_PATH=$(gcc -print-file-name=libssp.a)
          echo "libssp found at: $LIBSSP_PATH"
          # Only output if gcc found an actual path (not just filename)
          # Check for Unix path (/) or Windows path (X:/)
          if [[ "$LIBSSP_PATH" == /* ]] || [[ "$LIBSSP_PATH" =~ ^[A-Za-z]:/ ]]; then
            LIBSSP_DIR=$(dirname "$LIBSSP_PATH")
            LIBSSP_DIR_WIN=$(cygpath -m "$LIBSSP_DIR")
            echo "libssp Windows path: $LIBSSP_DIR_WIN"
            echo "libssp-dir=$LIBSSP_DIR_WIN" >> "$GITHUB_OUTPUT"
            echo "cmake-exe-linker-flags=-DCMAKE_EXE_LINKER_FLAGS=-L$LIBSSP_DIR_WIN" >> "$GITHUB_OUTPUT"
            echo "cmake-shared-linker-flags=-DCMAKE_SHARED_LINKER_FLAGS=-L$LIBSSP_DIR_WIN" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::libssp.a not found in GCC search paths, skipping linker flags"
          fi

      - name: Setup ccache
        id: ccache-setup
        if: ${{ matrix.disable-ccache != true }}
        uses: openDAQ/openDAQ-CI-sandbox/.github/actions/ccache-setup@actions/ccache-setup
        with:
          cmake-config-args: ${{ matrix.cmake-defines }}
          cmake-build-type: ${{ matrix.cmake-build-type }}
          target-arch: ${{ matrix.enable-32bit == true && 'x86-32' || '' }}
          download-only: 'true'
      # TODO: End of sandbox-only steps

      - name: Build and Test
        id: build-and-test
        uses: ./.github/actions/build-sdk
        with:
          cmake-build-type: ${{ matrix.cmake-build-type }}
          cmake-config-preset: ${{ env.cmake_preset }}
          cmake-config-args: >-
            ${{ matrix.cmake-defines }}
            ${{ steps.find-libssp.outputs.cmake-exe-linker-flags || '' }}
            ${{ steps.find-libssp.outputs.cmake-shared-linker-flags || '' }}
          cmake-generator: ${{ matrix.cmake-generator }}
          enable-tests: true
          enable-32bit: ${{ matrix.enable-32bit == true }}
          ccache-key: ${{ steps.ccache-setup.outputs.cache-key }}
          ccache-dir: ${{ steps.ccache-setup.outputs.cache-dir }}
          ctest-exclude: ${{ matrix.ctest-exclude }}

      # TODO: Remove this 1 step before merging to openDAQ/openDAQ
      - name: Show ccache statistics
        if: ${{ matrix.disable-ccache != true }}
        run: ccache -sv
      # TODO: End of sandbox-only steps

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Unit Test Results (${{ matrix.name }})
          path: ${{ steps.build-and-test.outputs.gtest-xml-path }}

  build_linux:
    runs-on: ubuntu-latest
    name: ${{ matrix.name }}
    # ${{ }} expression syntax because of leading '!'
    # if: ${{ ! github.event.pull_request.draft }}
    if: false

    concurrency:
      group: ${{ github.workflow }}-${{ github.head_ref }}-${{ matrix.name }}
      cancel-in-progress: true
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu Latest gcc-9 Release
            additional-packages: g++-9
            cmake-generator: Ninja
            cmake-build-type: Release
            cmake-defines: -DCMAKE_C_COMPILER=gcc-9 -DCMAKE_CXX_COMPILER=g++-9
          - name: Ubuntu Latest gcc-14 Release
            additional-packages: g++-14
            cmake-generator: Ninja
            cmake-build-type: Release
            cmake-defines: -DCMAKE_C_COMPILER=gcc-14 -DCMAKE_CXX_COMPILER=g++-14
          - name: Ubuntu Latest clang-14 Release
            additional-packages: clang-14
            cmake-generator: Ninja
            cmake-build-type: Release
            cmake-defines: -DCMAKE_C_COMPILER=clang-14 -DCMAKE_CXX_COMPILER=clang++-14
          - name: Ubuntu Latest clang-16 Release
            additional-packages: clang-16
            cmake-generator: Ninja
            cmake-build-type: Release
            cmake-defines: -DCMAKE_C_COMPILER=clang-16 -DCMAKE_CXX_COMPILER=clang++-16
          - name: Ubuntu Latest gcc-9 Debug
            additional-packages: g++-9
            cmake-generator: Ninja
            cmake-build-type: Debug
            cmake-defines: -DCMAKE_C_COMPILER=gcc-9 -DCMAKE_CXX_COMPILER=g++-9
          - name: Ubuntu Latest gcc-14 Debug
            additional-packages: g++-14
            cmake-generator: Ninja
            cmake-build-type: Debug
            cmake-defines: -DCMAKE_C_COMPILER=gcc-14 -DCMAKE_CXX_COMPILER=g++-14
          - name: Ubuntu Latest clang-14 Debug
            additional-packages: clang-14
            cmake-generator: Ninja
            cmake-build-type: Debug
            cmake-defines: -DCMAKE_C_COMPILER=clang-14 -DCMAKE_CXX_COMPILER=clang++-14
          - name: Ubuntu Latest clang-16 Debug
            additional-packages: clang-16
            cmake-generator: Ninja
            cmake-build-type: Debug
            cmake-defines: -DCMAKE_C_COMPILER=clang-16 -DCMAKE_CXX_COMPILER=clang++-16

    steps:
      # TODO: Remove these 3 steps before merging to openDAQ/openDAQ
      - name: Checkout openDAQ
        if: github.repository != 'openDAQ/openDAQ'
        uses: actions/checkout@v4
        with:
          repository: openDAQ/openDAQ

      - name: Checkout CI actions
        if: github.repository != 'openDAQ/openDAQ'
        uses: actions/checkout@v4
        with:
          path: _ci-sandbox

      - name: Copy CI actions
        if: github.repository != 'openDAQ/openDAQ'
        shell: bash
        run: cp -r _ci-sandbox/.github/actions .github/

      - name: Setup ccache
        if: ${{ matrix.disable-ccache != true }}
        uses: openDAQ/openDAQ-CI-sandbox/.github/actions/ccache-setup@actions/ccache-setup
        with:
          cmake-config-args: ${{ matrix.cmake-defines }}
          cmake-build-type: ${{ matrix.cmake-build-type }}
          target-arch: ${{ matrix.enable_32bit == true && 'x86-32' || '' }}
      # TODO: End of sandbox-only steps

      - name: Build and Test
        id: build-and-test
        uses: ./.github/actions/build-sdk
        with:
          additional-dependencies: ${{ matrix.additional-packages }}
          cmake-build-type: ${{ matrix.cmake-build-type }}
          cmake-config-preset: ${{ env.cmake_preset }}
          cmake-config-args: ${{ matrix.cmake-defines }}
          cmake-generator: ${{ matrix.cmake-generator }}
          enable-tests: true

      # TODO: Remove this 1 step before merging to openDAQ/openDAQ
      - name: Show ccache statistics
        if: ${{ matrix.disable-ccache != true }}
        run: ccache -sv
      # TODO: End of sandbox-only steps

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Unit Test Results (${{ matrix.name }})
          path: ${{ steps.build-and-test.outputs.gtest-xml-path }}
