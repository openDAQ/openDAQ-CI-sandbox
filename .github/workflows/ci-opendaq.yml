name: Stage openDAQ

on:
  workflow_dispatch:
    inputs:
      run-id:
        description: 'Run ID with existing artifacts (skip build, deploy only)'
        required: false
        type: string

env:
  project_org: openDAQ
  project_repo: openDAQ
  project_ref: ci/staging

jobs:
  resolve:
    name: Resolve source SHA
    runs-on: ubuntu-latest
    outputs:
      org: ${{ env.project_org }}
      repo: ${{ env.project_repo }}
      ref: ${{ env.project_ref }}
      sha: ${{ steps.resolve.outputs.sha }}
    steps:
      - name: Resolve source SHA
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(gh api "repos/${{ env.project_org }}/${{ env.project_repo }}/commits/${{ env.project_ref }}" --jq '.sha')
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Resolved ${{ env.project_org }}/${{ env.project_repo }}@${{ env.project_ref }} -> $SHA"

  ci:
    if: ${{ inputs.run-id == '' }}
    needs: resolve
    name: openDAQ-Build
    uses: ./.github/workflows/reusable.yml
    with:
      project-org: ${{ needs.resolve.outputs.org }}
      project-repo: ${{ needs.resolve.outputs.repo }}
      project-ref: ${{ needs.resolve.outputs.ref }}
      timeout: '[{"timeout-minutes": 270}]'
      include-jobs: >
        [
          "macos-26-x86_64-ninja-appleclang-release",
          "macos-26-armv8-ninja-appleclang-release",
          "windows-2022-x86_64-msvs-v143-release",
          "windows-2022-x86-msvs-v143-release",
          "ubuntu-22.04-x86_64-ninja-gcc-14-release",
          "ubuntu-22.04-armv8-ninja-gcc-14-release",
          "manylinux_2_28-x86_64-ninja-gcc-release",
          "manylinux_2_28-aarch64-ninja-gcc-release"
        ]
      cmake-presets: >
        [
          {
            "match-jobs": ["macos-*"],
            "configure-preset": "core",
            "cache-variables": {"CMAKE_OSX_DEPLOYMENT_TARGET": "10.15"},
            "staging": true
          },
          {
            "match-jobs": ["windows-*"],
            "configure-preset": "core",
            "cache-variables": {"OPENDAQ_MSVC_SINGLE_PROCESS_BUILD": true},
            "staging": true
          },
          {
            "match-jobs": ["ubuntu-*", "manylinux_2_28-*"],
            "configure-preset": "core",
            "staging": true
          }
        ]
      packages: >
        [
          {
            "match-jobs": ["manylinux_2_28-*"],
            "yum-install": [
              "mono-core", "freetype-devel", "libudev-devel", "libX11-devel",
              "libXi-devel", "libXcursor-devel", "libXrandr-devel", "mesa-libGL-devel"
            ]
          }
        ]

  deploy:
    if: ${{ !cancelled() && (inputs.run-id != '' || needs.ci.result == 'success') }}
    needs: [ci, resolve]
    permissions:
      packages: write
      contents: read
      actions: read
    uses: ./.github/workflows/deploy-staging.yml
    with:
      run-id: ${{ inputs.run-id }}
      images: >
        [
          {
            "artifact": "staging-*",
            "path": "ghcr.io/opendaq/sandbox",
            "tag": "${{ needs.resolve.outputs.sha }}"
          }
        ]
