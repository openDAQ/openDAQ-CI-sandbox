name: Build openDAQ SDK
description: Configure and build openDAQ SDK

inputs:
  source-path:
    description: 'Path to openDAQ source directory (defaults to ".")'
    required: false
    default: ''
  build-path:
    description: 'Path for build directory (defaults to "{source-path}/build")'
    required: false
    default: ''
  cmake-generator-name:
    description: 'CMake generator name (e.g., "Ninja", "Visual Studio 17 2022")'
    required: false
    default: ''
  cmake-preset-name:
    description: 'CMake preset name (e.g., "package", "ci")'
    required: false
    default: ''
  cmake-config:
    description: 'CMake build configuration (Release, Debug, RelWithDebInfo, MinSizeRel)'
    required: false
    default: 'Release'
  cmake-compiler:
    description: 'CMake compiler configuration (e.g., "-DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++ -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache")'
    required: false
    default: ''
  cmake-config-args:
    description: 'Additional CMake configure arguments'
    required: false
    default: ''
  cmake-build-args:
    description: 'Additional CMake build arguments'
    required: false
    default: ''
  ccache-enable:
    description: 'Enable compiler cache (works best with Ninja generator)'
    required: false
    default: 'false'
  ctest-enable:
    description: 'Run tests after build'
    required: false
    type: boolean
    default: false
  ctest-output-on-failure:
    description: 'Output test output on failure (false = use preset setting)'
    required: false
    type: boolean
    default: false
  ctest-preset:
    description: 'CTest preset name (e.g., "run_tests")'
    required: false
    default: ''
  ctest-tests-regex:
    description: 'Run only tests matching regex'
    required: false
    default: ''
  ctest-exclude-regex:
    description: 'Exclude tests matching regex'
    required: false
    default: ''
  gtest-output-xml-path:
    description: 'GTest XML output directory (empty = disabled)'
    required: false
    default: ''
  ctest-args:
    description: 'Additional CTest arguments'
    required: false
    default: ''
  cpack-generator-name:
    description: 'CPack generator name (e.g., "DEB", "NSIS", "TGZ", "ZIP")'
    required: false
    default: ''

outputs:
  version:
    description: 'openDAQ version'
    value: ${{ steps.read-version.outputs.version }}
  commit-hash:
    description: 'Short commit hash'
    value: ${{ steps.read-version.outputs.commit-hash }}
  build-path-unix:
    description: 'Unix-style absolute path to build directory (for bash commands)'
    value: ${{ steps.setup.outputs.build-path-unix }}
  build-path-windows:
    description: 'Windows-style absolute path to build directory (empty on non-Windows)'
    value: ${{ steps.setup.outputs.build-path-windows }}
  package-path-unix:
    description: 'Unix-style absolute path to packages directory (build/_packages)'
    value: ${{ steps.setup.outputs.package-path-unix }}
  package-path-windows:
    description: 'Windows-style absolute path to packages directory (empty on non-Windows)'
    value: ${{ steps.setup.outputs.package-path-windows }}
  gtest-xml-report-path-unix:
    description: 'Unix-style absolute path to GTest XML reports directory (empty if disabled)'
    value: ${{ steps.setup.outputs.gtest-xml-report-path-unix }}
  gtest-xml-report-path-windows:
    description: 'Windows-style absolute path to GTest XML reports directory (empty if disabled or on non-Windows)'
    value: ${{ steps.setup.outputs.gtest-xml-report-path-windows }}

runs:
  using: composite
  steps:
    - name: Setup paths and parameters
      id: setup
      shell: bash
      run: |
        # Initialize variable with default value
        __daq_init_var() {
          echo "${1:-$2}"
        }

        # Normalize path to Unix style
        __daq_path_unix() {
          if command -v cygpath &> /dev/null; then
            cygpath -u "$1"
          else
            echo "$1"
          fi
        }

        # Normalize path to Windows style
        __daq_path_windows() {
          if command -v cygpath &> /dev/null; then
            cygpath -w "$1"
          else
            echo "$1"
          fi
        }

        # Format variable into argument
        __daq_fmt_var() {
          local format="$1"
          local value="$2"
          [ -n "$value" ] && printf -- "$format" "$value" || echo ""
        }

        # ===== PATH SETUP =====

        # Set default source and build paths if needed
        SOURCE_PATH=$(__daq_init_var "${{ inputs.source-path }}" ".")
        SOURCE_PATH=$(__daq_path_unix "$SOURCE_PATH")

        BUILD_PATH=$(__daq_init_var "${{ inputs.build-path }}" "$SOURCE_PATH/build")
        BUILD_PATH=$(__daq_path_unix "$BUILD_PATH")

        # Create build directory and convert to absolute path
        mkdir -p "$BUILD_PATH"

        # Convert to absolute path
        SOURCE_PATH=$(cd "$SOURCE_PATH" && pwd)
        BUILD_PATH=$(cd "$BUILD_PATH" && pwd)

        echo "source-path=$SOURCE_PATH" >> "$GITHUB_OUTPUT"
        echo "build-path=$BUILD_PATH" >> "$GITHUB_OUTPUT"

        # ===== PLATFORM-SPECIFIC PATH NORMALIZATION =====

        # On Windows runners, bash cannot start with Unix-style working directory
        echo "opendaq-working-dir=$(__daq_path_windows "$SOURCE_PATH")" >> "$GITHUB_OUTPUT"

        # ===== CMAKE CONFIGURATION =====

        # CMake generator (no default - user must specify)
        CMAKE_GENERATOR=$(__daq_fmt_var '-G "%s"' "${{ inputs.cmake-generator-name }}")
        echo "cmake-generator=$CMAKE_GENERATOR" >> "$GITHUB_OUTPUT"

        # CMake config (no default - user must specify)
        CMAKE_CONFIG="${{ inputs.cmake-config }}"
        echo "cmake-config=$CMAKE_CONFIG" >> "$GITHUB_OUTPUT"

        # Build type argument
        CMAKE_BUILD_TYPE=$(__daq_fmt_var '-DCMAKE_BUILD_TYPE=%s' "$CMAKE_CONFIG")
        echo "cmake-build-type=$CMAKE_BUILD_TYPE" >> "$GITHUB_OUTPUT"

        # Set cmake-preset (as --preset flag or empty string)
        CMAKE_PRESET=$(__daq_fmt_var '--preset %s' "${{ inputs.cmake-preset-name }}")
        echo "cmake-preset=$CMAKE_PRESET" >> "$GITHUB_OUTPUT"

        # ===== CMAKE BUILD CONFIGURATION =====

        # Build config argument
        CMAKE_BUILD_CONFIG=$(__daq_fmt_var '--config %s' "$CMAKE_CONFIG")
        echo "cmake-build-config=$CMAKE_BUILD_CONFIG" >> "$GITHUB_OUTPUT"

        # ===== CTEST CONFIGURATION =====

        # Config argument
        CTEST_CONFIG=$(__daq_fmt_var '-C %s' "$CMAKE_CONFIG")
        echo "ctest-config=$CTEST_CONFIG" >> "$GITHUB_OUTPUT"

        # output-on-failure
        CTEST_OUTPUT_ON_FAILURE=""
        if [ "${{ inputs.ctest-output-on-failure }}" = "true" ]; then
          CTEST_OUTPUT_ON_FAILURE="--output-on-failure"
        fi
        echo "ctest-output-on-failure=$CTEST_OUTPUT_ON_FAILURE" >> "$GITHUB_OUTPUT"

        # Preset
        CTEST_PRESET=$(__daq_fmt_var '--preset %s' "${{ inputs.ctest-preset }}")
        echo "ctest-preset=$CTEST_PRESET" >> "$GITHUB_OUTPUT"

        # Tests regex
        CTEST_TESTS_REGEX=$(__daq_fmt_var '--tests-regex %s' "${{ inputs.ctest-tests-regex }}")
        echo "ctest-tests-regex=$CTEST_TESTS_REGEX" >> "$GITHUB_OUTPUT"

        # Exclude regex
        CTEST_EXCLUDE_REGEX=$(__daq_fmt_var '--exclude-regex %s' "${{ inputs.ctest-exclude-regex }}")
        echo "ctest-exclude-regex=$CTEST_EXCLUDE_REGEX" >> "$GITHUB_OUTPUT"

        # GTest XML output - construct full value for GTEST_OUTPUT
        GTEST_XML_PATH="${{ inputs.gtest-output-xml-path }}"
        if [ -n "$GTEST_XML_PATH" ]; then
          # Make it relative to build path if not absolute
          if [[ ! "$GTEST_XML_PATH" = /* ]]; then
            GTEST_XML_PATH="$BUILD_PATH/$GTEST_XML_PATH"
          fi
          mkdir -p "$GTEST_XML_PATH"
          # On Windows, GTest needs Windows-style paths
          GTEST_XML_PATH=$(__daq_path_windows "$GTEST_XML_PATH")
          GTEST_OUTPUT="xml:$GTEST_XML_PATH/"
        else
          GTEST_OUTPUT=""
        fi
        echo "gtest-output=$GTEST_OUTPUT" >> "$GITHUB_OUTPUT"

        # Additional args
        CTEST_ARGS="${{ inputs.ctest-args }}"
        echo "ctest-args=$CTEST_ARGS" >> "$GITHUB_OUTPUT"

        # ===== PACKAGE PATH OUTPUTS =====

        # Set package path (where CPack creates packages)
        PACKAGE_PATH="$BUILD_PATH/_packages"

        # Unix-style paths (always available)
        echo "build-path-unix=$BUILD_PATH" >> "$GITHUB_OUTPUT"
        echo "package-path-unix=$PACKAGE_PATH" >> "$GITHUB_OUTPUT"
        echo "gtest-xml-report-path-unix=$GTEST_XML_PATH" >> "$GITHUB_OUTPUT"

        # Windows-style paths (empty on non-Windows)
        if command -v cygpath &> /dev/null; then
          echo "build-path-windows=$(__daq_path_windows "$BUILD_PATH")" >> "$GITHUB_OUTPUT"
          echo "package-path-windows=$(__daq_path_windows "$PACKAGE_PATH")" >> "$GITHUB_OUTPUT"
          if [ -n "$GTEST_XML_PATH" ]; then
            echo "gtest-xml-report-path-windows=$(__daq_path_windows "$GTEST_XML_PATH")" >> "$GITHUB_OUTPUT"
          else
            echo "gtest-xml-report-path-windows=" >> "$GITHUB_OUTPUT"
          fi
        else
          echo "build-path-windows=" >> "$GITHUB_OUTPUT"
          echo "package-path-windows=" >> "$GITHUB_OUTPUT"
          echo "gtest-xml-report-path-windows=" >> "$GITHUB_OUTPUT"
        fi

    - name: Read version and commit hash
      id: read-version
      shell: bash
      working-directory: ${{ steps.setup.outputs.opendaq-working-dir }}
      run: |
        # Read openDAQ version
        version=$(cat opendaq_version)
        version="v${version%%dev}"
        echo "openDAQ version: $version"
        echo "version=$version" >> "$GITHUB_OUTPUT"

        # Get short commit hash
        commit_hash=$(git rev-parse --short HEAD)
        echo "Commit hash: $commit_hash"
        echo "commit-hash=$commit_hash" >> "$GITHUB_OUTPUT"

    - name: Setup compiler cache directory
      if: inputs.ccache-enable == 'true'
      id: ccache-config
      shell: bash
      working-directory: ${{ steps.setup.outputs.opendaq-working-dir }}
      run: |
        # Set ccache directory and create if it doesn't exist
        CCACHE_DIR=".ccache"
        mkdir -p "$CCACHE_DIR"
        CCACHE_DIR="$(cd "$CCACHE_DIR" && pwd)"

        # Windows-specific settings
        if command -v cygpath &> /dev/null; then
          CCACHE_DIR="$(cygpath -w "$CCACHE_DIR")"
          CCACHE_BASEDIR="$(cygpath -w "$(pwd)")"
          echo "CCACHE_DIR=$CCACHE_DIR" >> "$GITHUB_ENV"
          echo "CCACHE_BASEDIR=$CCACHE_BASEDIR" >> "$GITHUB_ENV"
          echo "CCACHE_SLOPPINESS=pch_defines,time_macros" >> "$GITHUB_ENV"
          echo "Using CCACHE_DIR: $CCACHE_DIR"
          echo "Using CCACHE_BASEDIR: $CCACHE_BASEDIR"
        else
          echo "CCACHE_DIR=$CCACHE_DIR" >> "$GITHUB_ENV"
          echo "Using CCACHE_DIR: $CCACHE_DIR"
        fi

        echo "ccache-dir=$CCACHE_DIR" >> "$GITHUB_OUTPUT"

    - name: Restore compiler cache
      if: inputs.ccache-enable == 'true'
      uses: actions/cache@v4
      with:
        path: ${{ steps.ccache-config.outputs.ccache-dir }}
        key: ccache-${{ env.ImageOS }}-${{ runner.arch }}-${{ hashFiles('**/*.c','**/*.cpp') }}
        restore-keys: |
          ccache-${{ env.ImageOS }}-${{ runner.arch }}-

    - name: Configure CMake
      shell: bash
      working-directory: ${{ steps.setup.outputs.opendaq-working-dir }}
      run: |
        echo "CMake Configuration:"
        echo "  Source: ${{ steps.setup.outputs.source-path }}"
        echo "  Build: ${{ steps.setup.outputs.build-path }}"
        echo "  Generator: ${{ steps.setup.outputs.cmake-generator }}"
        echo "  Preset: ${{ steps.setup.outputs.cmake-preset }}"
        echo "  Config: ${{ steps.setup.outputs.cmake-config }}"
        echo ""

        echo "::group::CMake Configuration Output"
        cmake -B "${{ steps.setup.outputs.build-path }}" \
          ${{ steps.setup.outputs.cmake-generator }} \
          ${{ steps.setup.outputs.cmake-preset }} \
          ${{ steps.setup.outputs.cmake-build-type }} \
          ${{ inputs.cmake-compiler }} \
          ${{ inputs.cmake-config-args }}
        echo "::endgroup::"
        echo "✓ CMake configuration completed"

    - name: Build
      shell: bash
      working-directory: ${{ steps.setup.outputs.opendaq-working-dir }}
      run: |
        echo "CMake Build:"
        echo "  Build dir: ${{ steps.setup.outputs.build-path }}"
        echo "  Config: ${{ steps.setup.outputs.cmake-config }}"
        echo ""
        echo "::group::CMake Build Output"
        cmake --build "${{ steps.setup.outputs.build-path }}" \
          ${{ steps.setup.outputs.cmake-build-config }} \
          ${{ inputs.cmake-build-args }}
        echo "::endgroup::"
        echo "✓ Build completed successfully"

    - name: Test
      if: inputs.ctest-enable == 'true'
      shell: bash
      working-directory: ${{ steps.setup.outputs.opendaq-working-dir }}
      env:
        GTEST_OUTPUT: ${{ steps.setup.outputs.gtest-output }}
      run: |
        echo "Running tests:"
        echo "  Source dir: ${{ steps.setup.outputs.source-path }}"
        echo "  Build dir: ${{ steps.setup.outputs.build-path }}"
        echo "  GTest output: ${{ steps.setup.outputs.gtest-output }}"
        echo "  CTest preset: ${{ inputs.ctest-preset }}"
        echo ""

        echo "::group::CTest Output"
        ctest --test-dir "${{ steps.setup.outputs.build-path }}" \
          ${{ steps.setup.outputs.ctest-config }} \
          ${{ steps.setup.outputs.ctest-output-on-failure }} \
          ${{ steps.setup.outputs.ctest-preset }} \
          ${{ steps.setup.outputs.ctest-tests-regex }} \
          ${{ steps.setup.outputs.ctest-exclude-regex }} \
          ${{ steps.setup.outputs.ctest-args }}
        echo "::endgroup::"
        echo "✓ Tests completed"

    - name: Package
      if: inputs.cpack-generator-name != ''
      shell: bash
      working-directory: ${{ steps.setup.outputs.opendaq-working-dir }}
      run: |
        echo "CPack Packaging:"
        echo "  Build dir: ${{ steps.setup.outputs.build-path }}"
        echo "  Generator: ${{ inputs.cpack-generator-name }}"
        echo ""
        echo "::group::CPack Output"
        cpack --config "${{ steps.setup.outputs.build-path }}/CPackConfig.cmake" -G ${{ inputs.cpack-generator-name }}
        echo "::endgroup::"
        echo "✓ Package created successfully"

    - name: Print compiler cache stats
      if: inputs.ccache-enable == 'true'
      shell: bash
      run: |
        echo "::group::Compiler cache statistics"
        ccache -s -v
        echo "::endgroup::"
