name: Build and Test openDAQ

on:
  workflow_dispatch:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

  workflow_call:
    inputs:
      cmake_preset:
        required: false
        type: string
      ctest_preset:
        required: false
        type: string

env:
  cmake_preset: ${{ inputs.cmake_preset != '' && inputs.cmake_preset || 'ci' }}
  ctest_preset: ${{ inputs.ctest_preset != '' && inputs.ctest_preset || 'run_tests' }}
  OPENDAQ_SINK_CONSOLE_LOG_LEVEL: 1

jobs:
  test_oneapi_setup:
    runs-on: windows-latest
    name: Test Intel oneAPI Setup
    timeout-minutes: 30
    if: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Intel oneAPI
        uses: ./.github/actions/setup-compiler-oneapi

      - name: Test compile Hello World
        shell: bash
        run: |
          cat > hello.cpp << 'EOF'
          #include <iostream>
          int main() {
              std::cout << "Hello from Intel oneAPI!" << std::endl;
              return 0;
          }
          EOF

          icx hello.cpp -o hello.exe
          ./hello.exe

  build_windows:
    runs-on: windows-latest
    name: ${{ matrix.name }}
    # if: ${{ ! github.event.pull_request.draft }}

    concurrency:
      group: ${{ github.workflow }}-${{ github.head_ref }}-${{ matrix.name }}
      cancel-in-progress: true
    timeout-minutes: 270
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows VS 2022 x64 Release
            cmake-build-type: Release
            cmake-defines:
            cmake-generator: "Visual Studio 17 2022"
            enable-tests: true
          # - name: Windows VS 2022 x64 Debug
          #   cmake-build-type: Debug
          #   cmake-defines:
          #   cmake-generator: "Visual Studio 17 2022"
          #   enable-tests: true
          #   disable-ccache : true
          - name: Windows VS 2022 Win32 Release
            cmake-build-type: Release
            cmake-defines: -A Win32
            cmake-generator: "Visual Studio 17 2022"
            enable-32bit: true
            enable-tests: true
            disable-ccache : true

          - name: Windows Clang Release
            cmake-build-type: Release
            cmake-defines: >-
              -DCMAKE_C_COMPILER=clang
              -DCMAKE_CXX_COMPILER=clang++
              -DCMAKE_C_COMPILER_LAUNCHER=ccache
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
            cmake-generator: Ninja
            enable-tests: true
            disable-ccache : false

          # - name: Windows GCC Release
          #   cmake-build-type: Release
          #   cmake-defines: >-
          #     -DCMAKE_C_COMPILER=gcc
          #     -DCMAKE_CXX_COMPILER=g++
          #     "-DCMAKE_CXX_FLAGS=-Wa,-mbig-obj -Wno-deprecated-declarations -Wno-error=conversion-null"
          #     "-DCMAKE_C_FLAGS=-Wa,-mbig-obj"
          #   cmake-generator: Ninja
          #   # Tests are disabled due to:
          #   # - test_device_modules memory corruption
          #   # - Python tests module resolution issues
          #   enable-tests: false
          #   disable-ccache: true

          - name: Windows Intel oneAPI Release
            cmake-build-type: Release
            cmake-defines: >-
              -DCMAKE_C_COMPILER=icx
              -DCMAKE_CXX_COMPILER=icx
              -DCMAKE_C_COMPILER_LAUNCHER=ccache
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
            cmake-generator: Ninja
            enable-32bit: false
            enable-tests: true
            disable-ccache: false
            use-oneapi: true

          - name: Windows Intel oneAPI Release (No bindings)
            cmake-build-type: Release
            cmake-defines: >-
              -DCMAKE_C_COMPILER=icx
              -DCMAKE_CXX_COMPILER=icx
              -DCMAKE_C_COMPILER_LAUNCHER=ccache
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
              -DOPENDAQ_GENERATE_PYTHON_BINDINGS=OFF
              -DOPENDAQ_GENERATE_CSHARP_BINDINGS=OFF
            cmake-generator: Ninja
            enable-32bit: false
            enable-tests: true
            disable-ccache: false
            use-oneapi: true


    steps:
      # TODO: Remove these 3 steps before merging to openDAQ/openDAQ
      - name: Checkout openDAQ
        if: github.repository != 'openDAQ/openDAQ'
        uses: actions/checkout@v4
        with:
          repository: openDAQ/openDAQ

      - name: Checkout CI actions
        if: github.repository != 'openDAQ/openDAQ'
        uses: actions/checkout@v4
        with:
          path: _ci-sandbox

      - name: Copy CI actions
        if: github.repository != 'openDAQ/openDAQ'
        shell: bash
        run: cp -r _ci-sandbox/.github/actions .github/

      - name: Apply patches
        if: github.repository != 'openDAQ/openDAQ'
        shell: bash
        run: |
          if [ ! -d "_ci-sandbox/.github/patches" ]; then
            echo "No patches directory, nothing to apply"
            exit 0
          fi
          for patch in _ci-sandbox/.github/patches/*.patch; do
            [ -f "$patch" ] && git apply "$patch" && echo "Applied: $patch"
          done

      - name: Setup ccache
        if: ${{ matrix.disable-ccache != true }}
        uses: openDAQ/openDAQ-CI-sandbox/.github/actions/ccache-setup@actions/ccache-setup
        with:
          cmake-config-args: ${{ matrix.cmake-defines }}
          cmake-build-type: ${{ matrix.cmake-build-type }}
          target-arch: ${{ matrix.enable-32bit == true && 'x86-32' || '' }}

      - name: Setup Intel oneAPI
        if: matrix.use-oneapi == true
        uses: ./.github/actions/setup-compiler-oneapi
      # TODO: End of sandbox-only steps

      - name: Build and Test
        id: build-and-test
        uses: ./.github/actions/build-sdk
        with:
          cmake-build-type: ${{ matrix.cmake-build-type }}
          cmake-config-preset: ${{ env.cmake_preset }}
          cmake-config-args: ${{ matrix.cmake-defines }}
          cmake-generator: ${{ matrix.cmake-generator }}
          enable-tests: ${{ matrix.enable-tests == true }}
          enable-32bit: ${{ matrix.enable-32bit == true }}
          ctest-preset: ${{ env.ctest_preset }}

      # TODO: Remove this 1 step before merging to openDAQ/openDAQ
      - name: Show ccache statistics
        if: ${{ matrix.disable-ccache != true }}
        run: ccache -sv
      # TODO: End of sandbox-only steps

      - name: Upload test results
        if: ${{ always() && matrix.enable-tests == true }}
        uses: actions/upload-artifact@v4
        with:
          name: Unit Test Results (${{ matrix.name }})
          path: ${{ steps.build-and-test.outputs.gtest-xml-path }}

  build_linux:
    runs-on: ubuntu-latest
    name: ${{ matrix.name }}
    # ${{ }} expression syntax because of leading '!'
    # if: ${{ ! github.event.pull_request.draft }}
    if: false

    concurrency:
      group: ${{ github.workflow }}-${{ github.head_ref }}-${{ matrix.name }}
      cancel-in-progress: true
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu Latest gcc-9 Release
            additional-packages: g++-9
            cmake-generator: Ninja
            cmake-build-type: Release
            cmake-defines: -DCMAKE_C_COMPILER=gcc-9 -DCMAKE_CXX_COMPILER=g++-9
            disable-ccache : true

          - name: Ubuntu Latest gcc-14 Release
            additional-packages: g++-14
            cmake-generator: Ninja
            cmake-build-type: Release
            cmake-defines: -DCMAKE_C_COMPILER=gcc-14 -DCMAKE_CXX_COMPILER=g++-14
            disable-ccache : true

          - name: Ubuntu Latest clang-14 Release
            additional-packages: clang-14
            cmake-generator: Ninja
            cmake-build-type: Release
            cmake-defines: -DCMAKE_C_COMPILER=clang-14 -DCMAKE_CXX_COMPILER=clang++-14
            disable-ccache : true

          - name: Ubuntu Latest clang-16 Release
            additional-packages: clang-16
            cmake-generator: Ninja
            cmake-build-type: Release
            cmake-defines: -DCMAKE_C_COMPILER=clang-16 -DCMAKE_CXX_COMPILER=clang++-16
            disable-ccache : true

          # The Debug configurations are disabled until the problem with test_py_opendaq is resolved.
          # - name: Ubuntu Latest gcc-9 Debug
          #   additional-packages: g++-9
          #   cmake-generator: Ninja
          #   cmake-build-type: Debug
          #   cmake-defines: -DCMAKE_C_COMPILER=gcc-9 -DCMAKE_CXX_COMPILER=g++-9
          # - name: Ubuntu Latest gcc-14 Debug
          #   additional-packages: g++-14
          #   cmake-generator: Ninja
          #   cmake-build-type: Debug
          #   cmake-defines: -DCMAKE_C_COMPILER=gcc-14 -DCMAKE_CXX_COMPILER=g++-14
          # - name: Ubuntu Latest clang-14 Debug
          #   additional-packages: clang-14
          #   cmake-generator: Ninja
          #   cmake-build-type: Debug
          #   cmake-defines: -DCMAKE_C_COMPILER=clang-14 -DCMAKE_CXX_COMPILER=clang++-14
          # - name: Ubuntu Latest clang-16 Debug
          #   additional-packages: clang-16
          #   cmake-generator: Ninja
          #   cmake-build-type: Debug
          #   cmake-defines: -DCMAKE_C_COMPILER=clang-16 -DCMAKE_CXX_COMPILER=clang++-16

    steps:
      # TODO: Remove these 3 steps before merging to openDAQ/openDAQ
      - name: Checkout openDAQ
        if: github.repository != 'openDAQ/openDAQ'
        uses: actions/checkout@v4
        with:
          repository: openDAQ/openDAQ

      - name: Checkout CI actions
        if: github.repository != 'openDAQ/openDAQ'
        uses: actions/checkout@v4
        with:
          path: _ci-sandbox

      - name: Copy CI actions
        if: github.repository != 'openDAQ/openDAQ'
        shell: bash
        run: cp -r _ci-sandbox/.github/actions .github/

      - name: Apply patches
        if: github.repository != 'openDAQ/openDAQ'
        shell: bash
        run: |
          if [ ! -d "_ci-sandbox/.github/patches" ]; then
            echo "No patches directory, nothing to apply"
            exit 0
          fi
          for patch in _ci-sandbox/.github/patches/*.patch; do
            [ -f "$patch" ] && git apply "$patch" && echo "Applied: $patch"
          done

      - name: Setup ccache
        id: ccache-setup
        if: ${{ matrix.disable-ccache != true }}
        uses: openDAQ/openDAQ-CI-sandbox/.github/actions/ccache-setup@actions/ccache-setup
        with:
          cmake-config-args: ${{ matrix.cmake-defines }}
          cmake-build-type: ${{ matrix.cmake-build-type }}
          target-arch: ${{ matrix.enable_32bit == true && 'x86-32' || '' }}
      # TODO: End of sandbox-only steps

      - name: Build and Test
        id: build-and-test
        uses: ./.github/actions/build-sdk
        with:
          additional-dependencies: ${{ matrix.additional-packages }}
          cmake-build-type: ${{ matrix.cmake-build-type }}
          cmake-config-preset: ${{ env.cmake_preset }}
          cmake-config-args: ${{ matrix.cmake-defines }}
          cmake-generator: ${{ matrix.cmake-generator }}
          enable-tests: true
          ctest-preset: ${{ env.ctest_preset }}

      # TODO: Remove this 1 step before merging to openDAQ/openDAQ
      - name: Show ccache statistics
        if: ${{ matrix.disable-ccache != true }}
        run: ccache -sv

      # Save ccache on build failure to preserve compilation progress
      - name: Save ccache on failure
        if: failure() && matrix.disable-ccache != true
        uses: actions/cache/save@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: ${{ steps.ccache-setup.outputs.cache-key }}
      # TODO: End of sandbox-only steps

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Unit Test Results (${{ matrix.name }})
          path: ${{ steps.build-and-test.outputs.gtest-xml-path }}

  build_macos:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    # if: ${{ ! github.event.pull_request.draft }}
    if: false
    
    concurrency:
      group: ${{ github.workflow }}-${{ github.head_ref }}-${{ matrix.name }}
      cancel-in-progress: true
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: MacOS Latest Clang Release
            cmake-generator: Ninja
            cmake-build-type: Release
            cmake-defines: >-
              -DCMAKE_C_COMPILER=clang
              -DCMAKE_CXX_COMPILER=clang++ 
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
              -DCMAKE_OSX_DEPLOYMENT_TARGET=10.15
            disable-ccache: 
            runner: macos-latest

          - name: MacOS 15 Intel Clang Release
            cmake-generator: Ninja
            cmake-build-type: Release
            cmake-defines: >-
              -DCMAKE_C_COMPILER=clang
              -DCMAKE_CXX_COMPILER=clang++
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
              -DCMAKE_OSX_DEPLOYMENT_TARGET=10.15
            disable-ccache: 
            runner: macos-15-intel

    steps:
      # TODO: Remove these 3 steps before merging to openDAQ/openDAQ
      - name: Checkout openDAQ
        if: github.repository != 'openDAQ/openDAQ'
        uses: actions/checkout@v4
        with:
          repository: openDAQ/openDAQ

      - name: Checkout CI actions
        if: github.repository != 'openDAQ/openDAQ'
        uses: actions/checkout@v4
        with:
          path: _ci-sandbox

      - name: Copy CI actions
        if: github.repository != 'openDAQ/openDAQ'
        shell: bash
        run: cp -r _ci-sandbox/.github/actions .github/

      - name: Apply patches
        if: github.repository != 'openDAQ/openDAQ'
        shell: bash
        run: |
          if [ ! -d "_ci-sandbox/.github/patches" ]; then
            echo "No patches directory, nothing to apply"
            exit 0
          fi
          for patch in _ci-sandbox/.github/patches/*.patch; do
            [ -f "$patch" ] && git apply "$patch" && echo "Applied: $patch"
          done

      - name: Setup ccache
        id: ccache-setup
        if: ${{ matrix.disable-ccache != true }}
        uses: openDAQ/openDAQ-CI-sandbox/.github/actions/ccache-setup@actions/ccache-setup
        with:
          cmake-config-args: ${{ matrix.cmake-defines }}
          cmake-build-type: ${{ matrix.cmake-build-type }}

      - name: Print Clang info
        run: |
          echo "------"
          echo "Clang: $(which clang)"
          clang --version
          echo "------"

      # TODO: End of sandbox-only steps

      - name: Build and Test
        id: build-and-test
        uses: ./.github/actions/build-sdk
        with:
          cmake-build-type: ${{ matrix.cmake-build-type }}
          cmake-config-preset: ${{ env.cmake_preset }}
          cmake-config-args: ${{ matrix.cmake-defines }}
          cmake-generator: ${{ matrix.cmake-generator }}
          enable-tests: true
          ctest-preset: ${{ env.ctest_preset }}

      # Save ccache on build failure to preserve compilation progress
      - name: Save ccache on failure
        if: failure() && matrix.disable-ccache != true
        uses: actions/cache/save@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: ${{ steps.ccache-setup.outputs.cache-key }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Unit Test Results (${{ matrix.name }})
          path: ${{ steps.build-and-test.outputs.gtest-xml-path }}

      # TODO: Remove this 1 step before merging to openDAQ/openDAQ
      - name: Show ccache statistics
        if: ${{ matrix.disable-ccache != true }}
        run: ccache -sv
      # TODO: End of sandbox-only steps