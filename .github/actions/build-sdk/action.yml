name: Build openDAQ SDK
description: Configure and build openDAQ SDK

inputs:
  source-path:
    description: 'Path to openDAQ source directory (defaults to ".")'
    required: false
    default: ''
  build-path:
    description: 'Path for build directory (defaults to "{source-path}/build")'
    required: false
    default: ''
  cmake-generator-name:
    description: 'CMake generator name (e.g., "Ninja", "Visual Studio 17 2022")'
    required: false
    default: ''
  cmake-preset-name:
    description: 'CMake preset name (e.g., "package", "ci")'
    required: false
    default: ''
  cmake-config:
    description: 'CMake build configuration (Release, Debug, RelWithDebInfo, MinSizeRel)'
    required: false
    default: 'Release'
  cmake-compiler:
    description: 'CMake compiler configuration (e.g., "-DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++ -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache")'
    required: false
    default: ''
  cmake-config-args:
    description: 'Additional CMake configure arguments'
    required: false
    default: ''
  cmake-build-args:
    description: 'Additional CMake build arguments'
    required: false
    default: ''
  cmake-parallel:
    description: 'CMake parallel build flags (e.g., "-j 4" or "--parallel 4")'
    required: false
    default: ''
  ccache-enable:
    description: 'Enable compiler cache (works best with Ninja generator)'
    required: false
    default: 'false'
  ccache-path:
    description: 'Path for ccache directory'
    required: false
    default: ''
  ctest-enable:
    description: 'Run tests after build'
    required: false
    type: boolean
    default: false
  ctest-output-on-failure:
    description: 'Output test output on failure (false = use preset setting)'
    required: false
    type: boolean
    default: false
  ctest-preset:
    description: 'CTest preset name (e.g., "run_tests")'
    required: false
    default: ''
  ctest-tests-regex:
    description: 'Run only tests matching regex'
    required: false
    default: ''
  ctest-exclude-regex:
    description: 'Exclude tests matching regex'
    required: false
    default: ''
  ctest-parallel:
    description: 'Number of parallel test jobs (0 = sequential)'
    required: false
    type: number
    default: 0
  gtest-output-xml-path:
    description: 'GTest XML output directory (empty = disabled)'
    required: false
    default: 'test_results'
  ctest-output-junit:
    description: 'CTest JUnit XML file path (empty = disabled)'
    required: false
    default: ''
  ctest-args:
    description: 'Additional CTest arguments'
    required: false
    default: ''
  cpack-generator-name:
    description: 'CPack generator name (e.g., "DEB", "RPM", "NSIS", "TGZ", "ZIP")'
    required: false
    default: ''

outputs:
  version:
    description: 'openDAQ version'
    value: ${{ steps.read-version.outputs.version }}
  commit-hash:
    description: 'Short commit hash'
    value: ${{ steps.read-version.outputs.commit-hash }}

runs:
  using: composite
  steps:
    - name: Setup paths and parameters
      id: setup
      shell: bash
      run: |
        # ===== PATH SETUP =====

        # Set default source path
        SOURCE_PATH="${{ inputs.source-path }}"
        if [ -z "$SOURCE_PATH" ]; then
          SOURCE_PATH="."
        fi

        # Normalize and convert to absolute path
        if command -v cygpath &> /dev/null; then
          # Windows: convert to Unix style first, then to absolute
          SOURCE_PATH=$(cygpath -u "$SOURCE_PATH")
          SOURCE_PATH=$(cd "$SOURCE_PATH" && pwd)
        else
          # Unix: convert to absolute
          SOURCE_PATH=$(cd "$SOURCE_PATH" && pwd)
        fi

        # Set default build path AFTER source path is normalized
        BUILD_PATH="${{ inputs.build-path }}"
        if [ -z "$BUILD_PATH" ]; then
          BUILD_PATH="$SOURCE_PATH/build"
        fi

        # Normalize build path and convert to absolute
        if command -v cygpath &> /dev/null; then
          # Windows: convert to Unix style if user provided path
          if [ -n "${{ inputs.build-path }}" ]; then
            BUILD_PATH=$(cygpath -u "$BUILD_PATH")
          fi
        fi

        # Create build directory and convert to absolute path
        mkdir -p "$BUILD_PATH"
        BUILD_PATH=$(cd "$BUILD_PATH" && pwd)

        echo "source-path=$SOURCE_PATH" >> "$GITHUB_OUTPUT"
        echo "build-path=$BUILD_PATH" >> "$GITHUB_OUTPUT"

        # Get git commit hash from source directory
        GIT_HASH=$(cd "$SOURCE_PATH" && git rev-parse --short HEAD)
        echo "git-hash=$GIT_HASH" >> "$GITHUB_OUTPUT"

        # ===== CMAKE CONFIGURATION =====

        # Set default cmake-generator
        CMAKE_GENERATOR_NAME="${{ inputs.cmake-generator-name }}"
        if [ -z "$CMAKE_GENERATOR_NAME" ]; then
          CMAKE_GENERATOR_NAME="Ninja"
        fi
        CMAKE_GENERATOR="-G \"$CMAKE_GENERATOR_NAME\""
        echo "cmake-generator=$CMAKE_GENERATOR" >> "$GITHUB_OUTPUT"

        # Set default cmake-config
        CMAKE_CONFIG="${{ inputs.cmake-config }}"
        if [ -z "$CMAKE_CONFIG" ]; then
          CMAKE_CONFIG="Release"
        fi
        echo "cmake-config=$CMAKE_CONFIG" >> "$GITHUB_OUTPUT"

        # Build type argument
        CMAKE_BUILD_TYPE="-DCMAKE_BUILD_TYPE=$CMAKE_CONFIG"
        echo "cmake-build-type=$CMAKE_BUILD_TYPE" >> "$GITHUB_OUTPUT"

        # Set cmake-preset (as --preset flag or empty string)
        CMAKE_PRESET_NAME="${{ inputs.cmake-preset-name }}"
        if [ -z "$CMAKE_PRESET_NAME" ]; then
          CMAKE_PRESET=""
        else
          CMAKE_PRESET="--preset $CMAKE_PRESET_NAME"
        fi
        echo "cmake-preset=$CMAKE_PRESET" >> "$GITHUB_OUTPUT"

        # Set default ccache path
        CCACHE_PATH="${{ inputs.ccache-path }}"
        if [ -z "$CCACHE_PATH" ]; then
          CCACHE_PATH="$SOURCE_PATH/.ccache"
        fi
        echo "ccache-path=$CCACHE_PATH" >> "$GITHUB_OUTPUT"

        # ===== CMAKE BUILD CONFIGURATION =====

        # Build config argument
        CMAKE_BUILD_CONFIG="--config $CMAKE_CONFIG"
        echo "cmake-build-config=$CMAKE_BUILD_CONFIG" >> "$GITHUB_OUTPUT"

        # Build parallel argument
        CMAKE_BUILD_PARALLEL="${{ inputs.cmake-parallel }}"
        echo "cmake-build-parallel=$CMAKE_BUILD_PARALLEL" >> "$GITHUB_OUTPUT"

        # Build cache key hash (from all CMake configure parameters)
        BUILD_KEY_STRING="${{ inputs.cmake-generator-name }}-${{ inputs.cmake-preset-name }}-$CMAKE_CONFIG-${{ inputs.cmake-compiler }}-${{ inputs.cmake-config-args }}"
        BUILD_CACHE_KEY=$(echo -n "$BUILD_KEY_STRING" | sha256sum | cut -d' ' -f1)
        echo "build-cache-key=$BUILD_CACHE_KEY" >> "$GITHUB_OUTPUT"

        # ===== CTEST CONFIGURATION =====

        # output-on-failure
        OUTPUT_ON_FAILURE="${{ inputs.ctest-output-on-failure }}"
        if [ "$OUTPUT_ON_FAILURE" = "true" ]; then
          OUTPUT_ON_FAILURE_ARG="--output-on-failure"
        else
          OUTPUT_ON_FAILURE_ARG=""
        fi
        echo "ctest-output-on-failure=$OUTPUT_ON_FAILURE_ARG" >> "$GITHUB_OUTPUT"

        # Preset
        CTEST_PRESET="${{ inputs.ctest-preset }}"
        if [ -n "$CTEST_PRESET" ]; then
          CTEST_PRESET_ARG="--preset $CTEST_PRESET"
        else
          CTEST_PRESET_ARG=""
        fi
        echo "ctest-preset=$CTEST_PRESET_ARG" >> "$GITHUB_OUTPUT"

        # Tests regex
        TESTS_REGEX="${{ inputs.ctest-tests-regex }}"
        if [ -n "$TESTS_REGEX" ]; then
          TESTS_REGEX_ARG="--tests-regex $TESTS_REGEX"
        else
          TESTS_REGEX_ARG=""
        fi
        echo "ctest-tests-regex=$TESTS_REGEX_ARG" >> "$GITHUB_OUTPUT"

        # Exclude regex
        EXCLUDE_REGEX="${{ inputs.ctest-exclude-regex }}"
        if [ -n "$EXCLUDE_REGEX" ]; then
          EXCLUDE_REGEX_ARG="--exclude-regex $EXCLUDE_REGEX"
        else
          EXCLUDE_REGEX_ARG=""
        fi
        echo "ctest-exclude-regex=$EXCLUDE_REGEX_ARG" >> "$GITHUB_OUTPUT"

        # Parallel
        PARALLEL="${{ inputs.ctest-parallel }}"
        if [ "$PARALLEL" -gt 0 ] 2>/dev/null; then
          PARALLEL_ARG="--parallel $PARALLEL"
        else
          PARALLEL_ARG=""
        fi
        echo "ctest-parallel=$PARALLEL_ARG" >> "$GITHUB_OUTPUT"

        # GTest XML output - construct full value for GTEST_OUTPUT
        GTEST_XML_PATH="${{ inputs.gtest-output-xml-path }}"
        if [ -n "$GTEST_XML_PATH" ]; then
          # Make it relative to build path if not absolute
          if [[ ! "$GTEST_XML_PATH" = /* ]]; then
            GTEST_XML_PATH="$BUILD_PATH/$GTEST_XML_PATH"
          fi
          mkdir -p "$GTEST_XML_PATH"
          GTEST_OUTPUT="xml:$GTEST_XML_PATH/"
        else
          GTEST_OUTPUT=""
        fi
        echo "gtest-output=$GTEST_OUTPUT" >> "$GITHUB_OUTPUT"

        # CTest JUnit output (normalize if needed)
        CTEST_JUNIT_PATH="${{ inputs.ctest-output-junit }}"
        if [ -n "$CTEST_JUNIT_PATH" ]; then
          # Make it relative to build path if not absolute
          if [[ ! "$CTEST_JUNIT_PATH" = /* ]]; then
            CTEST_JUNIT_PATH="$BUILD_PATH/$CTEST_JUNIT_PATH"
          fi
          # Create parent directory
          mkdir -p "$(dirname "$CTEST_JUNIT_PATH")"
          CTEST_JUNIT_ARG="--output-junit $CTEST_JUNIT_PATH"
        else
          CTEST_JUNIT_ARG=""
        fi
        echo "ctest-output-junit=$CTEST_JUNIT_ARG" >> "$GITHUB_OUTPUT"

        # Additional args
        CTEST_ARGS="${{ inputs.ctest-args }}"
        echo "ctest-args=$CTEST_ARGS" >> "$GITHUB_OUTPUT"

    - name: Read version and commit hash
      id: read-version
      shell: bash
      working-directory: ${{ steps.setup.outputs.source-path }}
      run: |
        # Read openDAQ version
        version=$(cat opendaq_version)
        version="v${version%%dev}"
        echo "openDAQ version: $version"
        echo "version=$version" >> "$GITHUB_OUTPUT"

        # Get short commit hash
        commit_hash=$(git rev-parse --short HEAD)
        echo "Commit hash: $commit_hash"
        echo "commit-hash=$commit_hash" >> "$GITHUB_OUTPUT"

    - name: Setup compiler cache directory
      if: inputs.ccache-enable == 'true'
      id: ccache-config
      shell: bash
      run: |
        # Get ccache path from setup
        CCACHE_PATH="${{ steps.setup.outputs.ccache-path }}"
        SOURCE_PATH="${{ steps.setup.outputs.source-path }}"

        # Create ccache directory if it doesn't exist
        mkdir -p "$CCACHE_PATH"

        # Convert to absolute path
        SOURCE_PATH_ABS="$(cd "$SOURCE_PATH" && pwd)"
        CCACHE_PATH_ABS="$(cd "$CCACHE_PATH" && pwd)"

        # Windows-specific settings
        if command -v cygpath &> /dev/null; then
          CCACHE_PATH_WIN="$(cygpath -w "$CCACHE_PATH_ABS")"
          BASEDIR_PATH="$(cygpath -w "$SOURCE_PATH_ABS")"
          echo "CCACHE_DIR=$CCACHE_PATH_WIN" >> "$GITHUB_ENV"
          echo "CCACHE_BASEDIR=$BASEDIR_PATH" >> "$GITHUB_ENV"
          echo "CCACHE_SLOPPINESS=pch_defines,time_macros" >> "$GITHUB_ENV"
          echo "Using CCACHE_DIR: $CCACHE_PATH_WIN"
          echo "Using CCACHE_BASEDIR: $BASEDIR_PATH"
          echo "dir=$CCACHE_PATH_WIN" >> "$GITHUB_OUTPUT"
        else
          echo "CCACHE_DIR=$CCACHE_PATH_ABS" >> "$GITHUB_ENV"
          echo "Using CCACHE_DIR: $CCACHE_PATH_ABS"
          echo "dir=$CCACHE_PATH_ABS" >> "$GITHUB_OUTPUT"
        fi

    - name: Restore compiler cache
      if: inputs.ccache-enable == 'true'
      uses: actions/cache@v4
      with:
        path: ${{ steps.ccache-config.outputs.dir }}
        key: ccache-${{ runner.os }}-${{ hashFiles('**/*.c','**/*.cpp') }}
        restore-keys: |
          ccache-${{ runner.os }}-

    - name: Restore build output
      uses: actions/cache@v4
      with:
        path: ${{ steps.setup.outputs.build-path }}
        key: build-${{ runner.os }}-${{ steps.setup.outputs.build-cache-key }}-${{ steps.setup.outputs.git-hash }}
        restore-keys: |
          build-${{ runner.os }}-${{ steps.setup.outputs.build-cache-key }}-
          build-${{ runner.os }}-

    - name: Configure CMake
      shell: bash
      working-directory: ${{ steps.setup.outputs.source-path }}
      run: |
        echo "CMake Configuration:"
        echo "  Source: ${{ steps.setup.outputs.source-path }}"
        echo "  Build: ${{ steps.setup.outputs.build-path }}"
        echo "  Generator: ${{ steps.setup.outputs.cmake-generator }}"
        echo "  Preset: ${{ steps.setup.outputs.cmake-preset }}"
        echo "  Config: ${{ steps.setup.outputs.cmake-config }}"
        echo ""

        echo "::group::CMake Configuration Output"
        cmake -B "${{ steps.setup.outputs.build-path }}" \
          ${{ steps.setup.outputs.cmake-generator }} \
          ${{ steps.setup.outputs.cmake-preset }} \
          ${{ steps.setup.outputs.cmake-build-type }} \
          ${{ inputs.cmake-compiler }} \
          ${{ inputs.cmake-config-args }}
        echo "::endgroup::"
        echo "✓ CMake configuration completed"

    - name: Build
      shell: bash
      working-directory: ${{ steps.setup.outputs.source-path }}
      run: |
        echo "CMake Build:"
        echo "  Build dir: ${{ steps.setup.outputs.build-path }}"
        echo "  Config: ${{ steps.setup.outputs.cmake-config }}"
        echo "  Parallel: ${{ steps.setup.outputs.cmake-build-parallel }}"
        echo ""
        echo "::group::CMake Build Output"
        cmake --build "${{ steps.setup.outputs.build-path }}" \
          ${{ steps.setup.outputs.cmake-build-config }} \
          ${{ steps.setup.outputs.cmake-build-parallel }} \
          ${{ inputs.cmake-build-args }}
        echo "::endgroup::"
        echo "✓ Build completed successfully"

    - name: Test
      if: inputs.ctest-enable == 'true'
      shell: bash
      working-directory: ${{ steps.setup.outputs.source-path }}
      env:
        GTEST_OUTPUT: ${{ steps.setup.outputs.gtest-output }}
      run: |
        echo "Running tests:"
        echo "  Source dir: ${{ steps.setup.outputs.source-path }}"
        echo "  Build dir: ${{ steps.setup.outputs.build-path }}"
        echo "  GTest output: ${{ steps.setup.outputs.gtest-output }}"
        echo "  CTest preset: ${{ inputs.ctest-preset }}"
        echo ""

        echo "::group::CTest Output"
        ctest --test-dir "${{ steps.setup.outputs.build-path }}" \
          ${{ steps.setup.outputs.ctest-output-on-failure }} \
          ${{ steps.setup.outputs.ctest-preset }} \
          ${{ steps.setup.outputs.ctest-tests-regex }} \
          ${{ steps.setup.outputs.ctest-exclude-regex }} \
          ${{ steps.setup.outputs.ctest-parallel }} \
          ${{ steps.setup.outputs.ctest-output-junit }} \
          ${{ steps.setup.outputs.ctest-args }}
        echo "::endgroup::"
        echo "✓ Tests completed"

    - name: Package
      if: inputs.cpack-generator-name != ''
      shell: bash
      working-directory: ${{ steps.setup.outputs.source-path }}
      run: |
        echo "CPack Packaging:"
        echo "  Build dir: ${{ steps.setup.outputs.build-path }}"
        echo "  Generator: ${{ inputs.cpack-generator-name }}"
        echo ""
        echo "::group::CPack Output"
        cpack --config "${{ steps.setup.outputs.build-path }}/CPackConfig.cmake" -G ${{ inputs.cpack-generator-name }}
        echo "::endgroup::"
        echo "✓ Package created successfully"

    - name: Print compiler cache stats
      if: inputs.ccache-enable == 'true'
      shell: bash
      run: |
        echo "::group::Compiler cache statistics"
        ccache -s -v
        echo "::endgroup::"
