name: Build and Test openDAQ

on:
  workflow_dispatch:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

  workflow_call:
    inputs:
      cmake_preset:
        required: false
        type: string
      ctest_preset:
        required: false
        type: string

env:
  s3_bucket: bb-blueberry-sdk-releases
  regression_tests_target_tag: v3.0.0
  regression_simulator_folder: regression_test_simulator
  cmake_preset: ${{ inputs.cmake_preset != '' && inputs.cmake_preset || 'ci' }}
  ctest_preset: ${{ inputs.ctest_preset != '' && inputs.ctest_preset || 'run_tests' }}
  test_path: ${{ github.workspace }}/junit_reports/
  build_path: ${{ github.workspace }}/build
  package_path: ${{ github.workspace }}/build/_packages/
  dotnet_bin_path: ${{ github.workspace }}/build/bindings/CSharp/bin
  dotnet_test_path: ${{ github.workspace }}/build/bindings/CSharp/test_results
  python_version_build: 3.11
  python_versions: 3.8 3.9 3.10 3.11 3.12 3.13 3.14
  OPENDAQ_SINK_CONSOLE_LOG_LEVEL: 1
  windows_x64_artifact: SdkWindows64
  linux_x64_artifact: SdkLinux64
  nuget_artifact: Packages (openDAQ.Net NuGet)

jobs:
  build_windows:
    runs-on: ${{ matrix.runner }}
    name: ${{ matrix.name }}
    # ${{ }} expression syntax because of leading '!'
    # if: ${{ ! github.event.pull_request.draft }}

    concurrency:
      group: ${{ github.workflow }}-${{ github.head_ref }}-${{ matrix.name }}
      cancel-in-progress: true
    timeout-minutes: 270
    strategy:
      fail-fast: false
      matrix:
        # https://docs.github.com/en/actions/using-github-hosted-runners/about-github-hosted-runners
        include:
          # - name: Windows VS 2022 x64 Release
          #   runner: windows-latest
          #   cmake-build-type: Release
          #   cmake-defines: -DDAQMODULES_PARQUET_RECORDER_MODULE=ON
          #   cmake-generator: "Visual Studio 17 2022"
          # - name: Windows VS 2022 x64 Debug
          #   runner: windows-latest
          #   cmake-build-type: Debug
          #   cmake-defines:
          #   cmake-generator: "Visual Studio 17 2022"
          # - name: Windows VS 2022 Win32 Release
          #   runner: windows-latest
          #   cmake-build-type: Release
          #   cmake-defines: -A Win32
          #   cmake-generator: "Visual Studio 17 2022"
          #   enable-32bit: true
          # - name: Windows Clang Release
          #   runner: windows-latest
          #   cmake-build-type: Release
          #   cmake-defines: -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++
          #   cmake-generator: Ninja
          - name: Windows GCC Release
            runner: windows-latest
            cmake-build-type: Release
            cmake-defines: >-
              -DCMAKE_C_COMPILER=gcc
              -DCMAKE_CXX_COMPILER=g++
              -DCMAKE_C_COMPILER_LAUNCHER=ccache
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
              "-DCMAKE_CXX_FLAGS=-Wno-deprecated-declarations -Wno-overloaded-virtual -Wa,-mbig-obj -Wno-error=conversion-null"
              "-DCMAKE_C_FLAGS=-Wa,-mbig-obj"
              "-DCMAKE_EXE_LINKER_FLAGS=-LC:/Strawberry/c/lib"
              "-DCMAKE_SHARED_LINKER_FLAGS=-LC:/Strawberry/c/lib"
              -DOPENDAQ_ENABLE_WEBSOCKET_STREAMING=OFF
            cmake-generator: Ninja
            disable-ccache: false
            enable-32bit: false
          - name: Windows GCC Release (MSYS2)
            runner: windows-latest
            cmake-build-type: Release
            cmake-defines: >-
              -DCMAKE_C_COMPILER=gcc
              -DCMAKE_CXX_COMPILER=g++
              -DCMAKE_C_COMPILER_LAUNCHER=ccache
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
              "-DCMAKE_CXX_FLAGS=-Wno-deprecated-declarations -Wno-overloaded-virtual -Wa,-mbig-obj -Wno-error=conversion-null"
              "-DCMAKE_C_FLAGS=-Wa,-mbig-obj"
              -DOPENDAQ_ENABLE_WEBSOCKET_STREAMING=OFF
            cmake-generator: Ninja
            disable-ccache: false
            enable-32bit: false
            use-msys-setup: true
          - name: Windows GCC Release (skip hanging)
            runner: windows-latest
            cmake-build-type: Release
            cmake-defines: >-
              -DCMAKE_C_COMPILER=gcc
              -DCMAKE_CXX_COMPILER=g++
              -DCMAKE_C_COMPILER_LAUNCHER=ccache
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
              "-DCMAKE_CXX_FLAGS=-Wno-deprecated-declarations -Wno-overloaded-virtual -Wa,-mbig-obj -Wno-error=conversion-null"
              "-DCMAKE_C_FLAGS=-Wa,-mbig-obj"
              "-DCMAKE_EXE_LINKER_FLAGS=-LC:/Strawberry/c/lib"
              "-DCMAKE_SHARED_LINKER_FLAGS=-LC:/Strawberry/c/lib"
              -DOPENDAQ_ENABLE_WEBSOCKET_STREAMING=OFF
            cmake-generator: Ninja
            disable-ccache: false
            enable-32bit: false
            ctest-exclude: test_coretypes

    steps:
      # TODO: Remove these 3 steps before merging to openDAQ/openDAQ
      - name: Checkout openDAQ
        if: github.repository != 'openDAQ/openDAQ'
        uses: actions/checkout@v4
        with:
          repository: openDAQ/openDAQ

      - name: Checkout CI actions
        if: github.repository != 'openDAQ/openDAQ'
        uses: actions/checkout@v4
        with:
          path: _ci-sandbox

      - name: Copy CI actions
        if: github.repository != 'openDAQ/openDAQ'
        shell: bash
        run: cp -r _ci-sandbox/.github/actions .github/

      - name: Apply patches
        if: github.repository != 'openDAQ/openDAQ'
        shell: bash
        run: |
          for patch in _ci-sandbox/.github/patches/*.patch; do
            [ -f "$patch" ] && git apply "$patch" && echo "Applied: $patch"
          done

      - name: Setup MSYS2
        if: ${{ matrix.use-msys-setup == true }}
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: mingw-w64-x86_64-crt-git mingw-w64-x86_64-gcc mingw-w64-x86_64-ninja mingw-w64-x86_64-ccache
          path-type: inherit

      - name: Verify libssp.a
        if: ${{ matrix.use-msys-setup == true }}
        shell: msys2 {0}
        run: |
          echo "libssp files:"
          ls -la /mingw64/lib/libssp* 2>/dev/null || echo "No libssp files found"
          echo "GCC search path:"
          gcc -print-file-name=libssp.a

      - name: Setup ccache
        id: ccache-setup
        if: ${{ matrix.disable-ccache != true }}
        uses: openDAQ/openDAQ-CI-sandbox/.github/actions/ccache-setup@actions/ccache-setup
        with:
          cmake-config-args: ${{ matrix.cmake-defines }}
          cmake-build-type: ${{ matrix.cmake-build-type }}
          target-arch: ${{ matrix.enable-32bit == true && 'x86-32' || '' }}
      # TODO: End of sandbox-only steps

      - name: Build and Test
        id: build-and-test
        uses: ./.github/actions/build-sdk
        with:
          cmake-build-type: ${{ matrix.cmake-build-type }}
          cmake-config-preset: ${{ env.cmake_preset }}
          cmake-config-args: ${{ matrix.cmake-defines }}
          cmake-generator: ${{ matrix.cmake-generator }}
          enable-tests: true
          enable-32bit: ${{ matrix.enable-32bit == true }}
          ccache-key: ${{ steps.ccache-setup.outputs.cache-key }}
          ccache-dir: ${{ steps.ccache-setup.outputs.cache-dir }}
          ctest-exclude: ${{ matrix.ctest-exclude }}

      # TODO: Remove this 1 step before merging to openDAQ/openDAQ
      - name: Show ccache statistics
        if: ${{ matrix.disable-ccache != true }}
        run: ccache -sv
      # TODO: End of sandbox-only steps

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Unit Test Results (${{ matrix.name }})
          path: ${{ steps.build-and-test.outputs.gtest-xml-path }}

  build_linux:
    runs-on: ubuntu-latest
    name: ${{ matrix.name }}
    # ${{ }} expression syntax because of leading '!'
    # if: ${{ ! github.event.pull_request.draft }}
    if: false

    concurrency:
      group: ${{ github.workflow }}-${{ github.head_ref }}-${{ matrix.name }}
      cancel-in-progress: true
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu Latest gcc-9 Release
            additional-packages: g++-9
            cmake-generator: Ninja
            cmake-build-type: Release
            cmake-defines: -DCMAKE_C_COMPILER=gcc-9 -DCMAKE_CXX_COMPILER=g++-9
          - name: Ubuntu Latest gcc-14 Release
            additional-packages: g++-14
            cmake-generator: Ninja
            cmake-build-type: Release
            cmake-defines: -DCMAKE_C_COMPILER=gcc-14 -DCMAKE_CXX_COMPILER=g++-14
          - name: Ubuntu Latest clang-14 Release
            additional-packages: clang-14
            cmake-generator: Ninja
            cmake-build-type: Release
            cmake-defines: -DCMAKE_C_COMPILER=clang-14 -DCMAKE_CXX_COMPILER=clang++-14
          - name: Ubuntu Latest clang-16 Release
            additional-packages: clang-16
            cmake-generator: Ninja
            cmake-build-type: Release
            cmake-defines: -DCMAKE_C_COMPILER=clang-16 -DCMAKE_CXX_COMPILER=clang++-16
          - name: Ubuntu Latest gcc-9 Debug
            additional-packages: g++-9
            cmake-generator: Ninja
            cmake-build-type: Debug
            cmake-defines: -DCMAKE_C_COMPILER=gcc-9 -DCMAKE_CXX_COMPILER=g++-9
          - name: Ubuntu Latest gcc-14 Debug
            additional-packages: g++-14
            cmake-generator: Ninja
            cmake-build-type: Debug
            cmake-defines: -DCMAKE_C_COMPILER=gcc-14 -DCMAKE_CXX_COMPILER=g++-14
          - name: Ubuntu Latest clang-14 Debug
            additional-packages: clang-14
            cmake-generator: Ninja
            cmake-build-type: Debug
            cmake-defines: -DCMAKE_C_COMPILER=clang-14 -DCMAKE_CXX_COMPILER=clang++-14
          - name: Ubuntu Latest clang-16 Debug
            additional-packages: clang-16
            cmake-generator: Ninja
            cmake-build-type: Debug
            cmake-defines: -DCMAKE_C_COMPILER=clang-16 -DCMAKE_CXX_COMPILER=clang++-16

    steps:
      # TODO: Remove these 3 steps before merging to openDAQ/openDAQ
      - name: Checkout openDAQ
        if: github.repository != 'openDAQ/openDAQ'
        uses: actions/checkout@v4
        with:
          repository: openDAQ/openDAQ

      - name: Checkout CI actions
        if: github.repository != 'openDAQ/openDAQ'
        uses: actions/checkout@v4
        with:
          path: _ci-sandbox

      - name: Copy CI actions
        if: github.repository != 'openDAQ/openDAQ'
        shell: bash
        run: cp -r _ci-sandbox/.github/actions .github/

      - name: Setup ccache
        if: ${{ matrix.disable-ccache != true }}
        uses: openDAQ/openDAQ-CI-sandbox/.github/actions/ccache-setup@actions/ccache-setup
        with:
          cmake-config-args: ${{ matrix.cmake-defines }}
          cmake-build-type: ${{ matrix.cmake-build-type }}
          target-arch: ${{ matrix.enable_32bit == true && 'x86-32' || '' }}
      # TODO: End of sandbox-only steps

      - name: Build and Test
        id: build-and-test
        uses: ./.github/actions/build-sdk
        with:
          additional-dependencies: ${{ matrix.additional-packages }}
          cmake-build-type: ${{ matrix.cmake-build-type }}
          cmake-config-preset: ${{ env.cmake_preset }}
          cmake-config-args: ${{ matrix.cmake-defines }}
          cmake-generator: ${{ matrix.cmake-generator }}
          enable-tests: true

      # TODO: Remove this 1 step before merging to openDAQ/openDAQ
      - name: Show ccache statistics
        if: ${{ matrix.disable-ccache != true }}
        run: ccache -sv
      # TODO: End of sandbox-only steps

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Unit Test Results (${{ matrix.name }})
          path: ${{ steps.build-and-test.outputs.gtest-xml-path }}
