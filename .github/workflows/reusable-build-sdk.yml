name: Build openDAQ SDK

on:
  workflow_call:
    inputs:
      ref:
        description: 'Branch, tag, or commit SHA to checkout'
        required: false
        type: string
        default: 'main'
      path:
        description: 'Path where to checkout the repository'
        required: false
        type: string
        default: '.'
      runner:
        description: 'Runner to use for the build'
        required: false
        type: string
        default: 'windows-latest'
      cmake-generator-name:
        description: 'CMake generator name (e.g., "Ninja", "Visual Studio 17 2022")'
        required: false
        type: string
        default: 'Ninja'
      cmake-preset-name:
        description: 'CMake preset name (e.g., "package", "ci")'
        required: false
        type: string
        default: ''
      cmake-compiler:
        description: 'CMake compiler configuration'
        required: false
        type: string
        default: ''
      cmake-config-args:
        description: 'Additional CMake configure arguments'
        required: false
        type: string
        default: ''
      cmake-build-args:
        description: 'Additional CMake build arguments'
        required: false
        type: string
        default: ''
      ccache-enable:
        description: 'Enable compiler cache (works best with Ninja generator)'
        required: false
        type: boolean
        default: false
      ctest-enable:
        description: 'Run tests after build'
        required: false
        type: boolean
        default: false
      ctest-output-on-failure:
        description: 'Output test output on failure (false = use preset setting)'
        required: false
        type: boolean
        default: false
      ctest-preset:
        description: 'CTest preset name (e.g., "run_tests")'
        required: false
        type: string
        default: ''
      ctest-tests-regex:
        description: 'Run only tests matching regex'
        required: false
        type: string
        default: ''
      ctest-exclude-regex:
        description: 'Exclude tests matching regex'
        required: false
        type: string
        default: ''
      ctest-parallel:
        description: 'Number of parallel test jobs (0 = sequential)'
        required: false
        type: number
        default: 0
      gtest-output-xml-path:
        description: 'GTest XML output directory (empty = disabled)'
        required: false
        type: string
        default: 'test_results'
      ctest-output-junit:
        description: 'CTest JUnit XML file path (empty = disabled)'
        required: false
        type: string
        default: ''
      ctest-args:
        description: 'Additional CTest arguments'
        required: false
        type: string
        default: ''
      cpack-generator-name:
        description: 'CPack generator name (e.g., "DEB", "RPM", "NSIS", "TGZ", "ZIP")'
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: ${{ inputs.runner }}

    steps:
      - name: Set defaults
        id: defaults
        shell: bash
        run: |
          # Set default path
          PATH_VALUE="${{ inputs.path }}"
          if [ -z "$PATH_VALUE" ]; then
            PATH_VALUE="."
          fi
          echo "path=$PATH_VALUE" >> "$GITHUB_OUTPUT"

          # Set default cmake-config-args
          CMAKE_CONFIG_ARGS="${{ inputs.cmake-config-args }}"
          if [ -z "$CMAKE_CONFIG_ARGS" ]; then
            CMAKE_CONFIG_ARGS_ARRAY=(
              "-DOPENDAQ_ENABLE_TESTS=OFF"
              "-DOPENDAQ_BUILD_DOCUMENTATION=OFF"
              "-DDAQSIMULATOR_ENABLE_SIMULATOR_APP=OFF"
              "-DDAQMODULES_REF_FB_MODULE=OFF"
              "-DOPENDAQ_GENERATE_PYTHON_BINDINGS=OFF"
              "-DDAQMODULES_REF_DEVICE_MODULE=OFF"
              "-DDAQMODULES_AUDIO_DEVICE_MODULE=OFF"
              "-DDAQMODULES_OPENDAQ_CLIENT_MODULE=OFF"
              "-DDAQMODULES_OPENDAQ_SERVER_MODULE=OFF"
              "-DDAQMODULES_BASIC_CSV_RECORDER_MODULE=OFF"
              "-DOPENDAQ_ENABLE_OPCUA=OFF"
              "-DOPENDAQ_ENABLE_WEBSOCKET_STREAMING=OFF"
              "-DOPENDAQ_ENABLE_NATIVE_STREAMING=OFF"
            )
            CMAKE_CONFIG_ARGS="${CMAKE_CONFIG_ARGS_ARRAY[*]}"
          fi
          echo "cmake-config-args=$CMAKE_CONFIG_ARGS" >> "$GITHUB_OUTPUT"

      - name: Setup cmake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '4.0'

      - name: Checkout CI workflows
        uses: actions/checkout@v4

      - name: Setup dependencies
        uses: ./.github/actions/setup-dependencies

      - name: Checkout openDAQ
        if: steps.defaults.outputs.path != '.'
        uses: actions/checkout@v4
        with:
          repository: openDAQ/openDAQ
          ref: ${{ inputs.ref }}
          path: ${{ steps.defaults.outputs.path }}

      - name: Build SDK
        id: build
        uses: ./.github/actions/build-sdk
        with:
          source-path: ${{ steps.defaults.outputs.path }}
          cmake-generator-name: ${{ inputs.cmake-generator-name }}
          cmake-preset-name: ${{ inputs.cmake-preset-name }}
          cmake-compiler: ${{ inputs.cmake-compiler }}
          cmake-config-args: ${{ steps.defaults.outputs.cmake-config-args }}
          cmake-build-args: ${{ inputs.cmake-build-args }}
          ccache-enable: ${{ inputs.ccache-enable }}
          ctest-enable: ${{ inputs.ctest-enable }}
          ctest-output-on-failure: ${{ inputs.ctest-output-on-failure }}
          ctest-preset: ${{ inputs.ctest-preset }}
          ctest-tests-regex: ${{ inputs.ctest-tests-regex }}
          ctest-exclude-regex: ${{ inputs.ctest-exclude-regex }}
          ctest-parallel: ${{ inputs.ctest-parallel }}
          gtest-output-xml-path: ${{ inputs.gtest-output-xml-path }}
          ctest-output-junit: ${{ inputs.ctest-output-junit }}
          ctest-args: ${{ inputs.ctest-args }}
          cpack-generator-name: ${{ inputs.cpack-generator-name }}

      - name: Compose openDAQ framework filename
        if: inputs.cpack-generator-name != ''
        id: opendaq-filename
        uses: openDAQ/actions/framework-compose-filename@jira/TBBAS-2672-opendaq-gh-actions-architecture
        with:
          version: ${{ steps.build.outputs.version }}-${{ steps.build.outputs.commit-hash }}
          packaging: ${{ inputs.cpack-generator-name }}

      - name: Prepare artifact
        if: inputs.cpack-generator-name != ''
        shell: bash
        env:
          ARTIFACT_FILENAME: ${{ steps.opendaq-filename.outputs.filename }}
          BUILD_PATH: ${{ steps.defaults.outputs.path }}/build
        run: |
          echo "Preparing Artifact:"
          echo "  Target: $ARTIFACT_FILENAME"
          echo ""

          echo "::group::Searching for package file"
          echo "Search directory: $BUILD_PATH/_packages"
          echo "Search pattern: opendaq*"
          ls -lah "$BUILD_PATH/_packages/" || echo "Directory not found or empty"
          echo "::endgroup::"

          source=$(find "$BUILD_PATH/_packages" -type f -iname 'opendaq*' | head -n1)

          if [ -z "$source" ]; then
            echo "::error::No package file found matching pattern 'opendaq*' in $BUILD_PATH/_packages"
            exit 1
          fi

          echo "Found: $source ($(du -h "$source" | cut -f1))"

          cp "$source" "./$ARTIFACT_FILENAME"

          if [ -f "./$ARTIFACT_FILENAME" ]; then
            echo "✓ Artifact prepared successfully"
            ls -lh "./$ARTIFACT_FILENAME"
          else
            echo "::error::Failed to copy artifact from '$source' to '$ARTIFACT_FILENAME'"
            exit 1
          fi

      - name: Upload artifact
        if: inputs.cpack-generator-name != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.opendaq-filename.outputs.filename }}
          path: ${{ steps.opendaq-filename.outputs.filename }}
          retention-days: 30
