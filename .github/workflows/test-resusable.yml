name: CI openDAQ

on:
  workflow_dispatch:
    inputs:
      opendaq-ref:
        description: "openDAQ commit, branch or tag"
        required: false
        default: ""
  push:

jobs:
  ci:
    name: openDAQ
    uses: ./.github/workflows/reusable.yml
    with:
      opendaq-ref: ${{ inputs.opendaq-ref || '' }}
      packages: >
        [
          {
            "match-jobs": ["ubuntu-*"],
            "apt-install": ["lld", "libx11-dev", "libxi-dev", "libxcursor-dev", "libxrandr-dev", "libgl-dev", "libudev-dev", "libfreetype6-dev"]
          },
          {
            "use-python-version": "3.14",
            "pip-install": ["numpy"]
          }
        ]
      timeout: '[{"timeout-minutes": 270}]'
      cmake-presets: >
        [
          {
            "configure-preset": "ci",
            "test-preset": "run_tests"
          },
          {
            "match-jobs": ["windows-*-msvs-*"],
            "configure-preset": "ci-msvc"
          },
          {
            "match-jobs": ["*-gcc-7-*"],
            "configure-preset": "ci-legacy-gcc"
          },
          {
            "match-jobs": ["macos-*"],
            "configure-preset": "ci-macos",
            "run-tests-priv": true
          }
        ]

