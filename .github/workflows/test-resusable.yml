name: CI openDAQ

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "Repository to checkout, in owner/name format"
        required: false
        default: "openDAQ/openDAQ"
      repo-ref:
        description: "Commit, branch or tag of the repository to checkout"
        required: false
        default: "jira/TBBAS-3212-replace-ci-with-reusable"
  push:

jobs:
  ci-opendaq:
    name: openDAQ
    uses: ./.github/workflows/reusable.yml
    with:
      repo: ${{ inputs.repo || 'openDAQ/openDAQ' }}
      repo-ref: ${{ inputs.repo-ref || 'jira/TBBAS-3212-replace-ci-with-reusable' }}
      timeout: '[{"timeout-minutes": 270}]'
      upload-pattern: 'ci-opendaq-*'
      # include-jobs: >
      #   [
      #     "windows-2025-x86_64-msvs-v143-debug",
      #     "windows-2025-x86-msvs-v143-release",
      #     "windows-2025-x86_64-ninja-clang-release",
      #     "windows-2025-x86_64-ninja-intel-cc-release",
      #     "ubuntu-20.04-x86-ninja-gcc-7-release",
      #     "ubuntu-20.04-x86_64-ninja-clang-9-release",
      #     "ubuntu-24.04-x86_64-ninja-gcc-14-debug",
      #     "ubuntu-24.04-x86_64-ninja-gcc-14-release",
      #     "ubuntu-24.04-x86_64-ninja-clang-18-release",
      #     "macos-26-x86_64-ninja-appleclang-debug",
      #     "macos-26-armv8-ninja-appleclang-release",
      #     "macos-15-x86_64-ninja-appleclang-release"
      #   ]
      include-jobs: >
        [
          "ubuntu-20.04-x86-ninja-gcc-7-release"
        ]
      packages: >
        [
          {
            "match-jobs": ["ubuntu-*-x86_64-*"],
            "apt-install": ["lld", "libx11-dev", "libxi-dev", "libxcursor-dev", "libxrandr-dev", "libgl-dev", "libudev-dev", "libfreetype6-dev"]
          },
          {
            "match-jobs": ["ubuntu-*-x86-*"],
            "apt-install": ["lld", "libx11-dev:i386", "libxi-dev:i386", "libxcursor-dev:i386", "libxrandr-dev:i386", "libgl-dev:i386", "libudev-dev:i386", "libfreetype6-dev:i386"]
          },
          {
            "match-jobs": ["windows-*", "*-x86_64-*", "macos-*"],
            "pip-install": ["numpy"],
            "use-python-version": "3.14"
          },
          {
            "match-jobs": ["ubuntu-20.04-*-clang-9-*"],
            "use-python-version": "3.8"
          }
        ]
      cmake-presets: >
        [
          {
            "configure-preset": "ci",
            "test-preset": "run_tests"
          },
          {
            "match-jobs": ["ubuntu-20.04-*-clang-9-*"],
            "configure-preset": "ci-legacy-compiler"
          },
          {
            "match-jobs": ["macos-*"],
            "run-tests-priv": true
          },
          {
            "match-jobs": ["*-intel-cc-*"],
            "configure-preset": "ci-no-bindings"
          },
          {
            "match-jobs": ["ubuntu-20.04-x86-*"],
            "configure-preset": "ci-legacy-compiler-x86"
          }
        ]

  ci-asam-cmp:
    name: ASAM CMP
    uses: ./.github/workflows/reusable.yml
    with:
      repo: openDAQ/ASAM-CMP-Modules
      upload-pattern: 'ci-asam-cmp-*'
      include-jobs: '["windows-*-clang-*"]'
      exclude-jobs: '["*"]'
      packages: >
        [
          {
            "match-jobs": ["ubuntu-*"],
            "apt-install": ["libpcap-dev"]
          },
          {
            "match-jobs": ["windows-*-ninja-clang-*"],
            "choco-install": ["ccache"]
          }
        ]
      cmake-presets: >
        [
          {
            "configure-preset": "module",
            "test-preset": "module-test"
          }
        ]

  ci-opcua:
    name: OPC UA
    uses: ./.github/workflows/reusable.yml
    with:
      repo: openDAQ/OpcUaModules
      upload-pattern: 'ci-opcua-*'
      include-jobs: '["windows-*-clang-*"]'
      exclude-jobs: '["*"]'
      cmake-presets: >
        [
          {
            "configure-preset": "module",
            "test-preset": "module-test"
          }
        ]

  ci-lt-streaming-legacy:
    name: LT Streaming Legacy
    uses: ./.github/workflows/reusable.yml
    with:
      repo: openDAQ/LTStreamingModulesLegacy
      upload-pattern: 'ci-lt-streaming-legacy-*'
      include-jobs: '["windows-*-clang-*"]'
      exclude-jobs: '["*"]'
      cmake-presets: >
        [
          {
            "configure-preset": "module",
            "test-preset": "module-test"
          }
        ]

  ci-lt-streaming-modern:
    name: LT Streaming Modern
    uses: ./.github/workflows/reusable.yml
    with:
      repo: openDAQ/LTStreamingModulesModern
      upload-pattern: 'ci-lt-streaming-modern-*'
      include-jobs: '["windows-*-clang-*"]'
      exclude-jobs: '["*"]'
      cmake-presets: >
        [
          {
            "configure-preset": "module",
            "test-preset": "module-test"
          }
        ]

  ci-mqtt-streaming:
    name: MQTT Streaming
    uses: ./.github/workflows/reusable.yml
    with:
      repo: openDAQ/MQTTStreamingModule
      upload-pattern: 'ci-mqtt-streaming-*'
      include-jobs: '["windows-*-clang-*"]'
      exclude-jobs: '["*"]'
      packages: >
        [
          {
            "match-jobs": ["ubuntu-*"],
            "apt-install": ["mosquitto"],
            "run": "mosquitto -d"
          },
          {
            "match-jobs": ["windows-*"],
            "winget-install": ["EclipseFoundation.Mosquitto"]
          },
          {
            "match-jobs": ["macos-*"],
            "brew-install": ["mosquitto"],
            "run": "$(brew --prefix mosquitto)/sbin/mosquitto -d"
          }
        ]
      cmake-presets: >
        [
          {
            "configure-preset": "module",
            "test-preset": "module-test"
          }
        ]
