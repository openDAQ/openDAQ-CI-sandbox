name: Deploy openDAQ packages (sandbox)

on:
  workflow_run:
    workflows: ["Build openDAQ packages"]
    types: [completed]

  workflow_dispatch:
    inputs:
      run-id:
        description: 'Package workflow run ID to deploy from (leave empty to use latest successful)'
        required: false
        type: string

env:
  project_ref: "905beb26396f474ce6ebb90d0148244f33d0370e"
  build_path: ${{ github.workspace }}/build

jobs:
  build_user_guide:
    runs-on: ubuntu-latest
    name: Build User Guide
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: openDAQ/openDAQ
          ref: ${{ env.project_ref }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'

      - name: Install Antora
        run: npm i antora

      - name: Install Antora extensions
        run: |
          npm i @asciidoctor/tabs
          npm i @springio/antora-extensions
          npm i @antora/lunr-extension

      - name: Run Antora to build user guide
        run: >
          [ "refs/heads/main" != "${{ github.ref }}" ] && npx antora antora-playbook.yml
          || (export DAQ_DEV_WEBSITE=docs-dev; npx antora antora-playbook-dev.yml)

      - name: Compress user guide
        working-directory: ${{ env.build_path }}/site/
        run: zip -r ${{ env.build_path }}/user_guide.zip .

      - name: Upload user guide
        uses: actions/upload-artifact@v4
        with:
          name: user_guide
          path: ${{ env.build_path }}/user_guide.zip
          retention-days: 7

      # - name: Configure AWS credentials
      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      #     aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      #     aws-region: ${{ secrets.AWS_REGION }}

      # - name: Upload user guide to S3
      #   run: |
      #     aws s3 rm "s3://${{ env.s3bucket }}/${{ env.s3docpath }}/" --recursive --exclude '*' --include 'user_guide.zip'
      #     aws s3 cp ${{ env.build_path }}/user_guide.zip "s3://${{ env.s3bucket }}/${{ env.s3docpath }}/"

      # - name: Call the API to deploy the documentation
      #   run: |
      #     if [ "${{ github.ref }}" == "refs/heads/main" ]; then
      #       wget ${{ secrets.DEPLOY_DEV_DOCUMENTATION_URL_AND_TOKEN }}
      #     else
      #       wget ${{ secrets.DEPLOY_DOCUMENTATION_URL_AND_TOKEN }}
      #     fi

      - name: Build examples archive
        run: zip -r opendaq-examples.zip examples/applications -x examples/applications/CMakeLists.txt

      - name: Upload examples
        uses: actions/upload-artifact@v4
        with:
          name: examples
          path: opendaq-examples.zip
          retention-days: 7

  deploy_packages:
    runs-on: ubuntu-latest
    name: Deploy packages to S3
    needs: [build_user_guide]

    env:
      RUN_ID: ${{ github.event.workflow_run.id || inputs.run-id }}

    steps:
      - name: Get source run info
        id: source-run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_INFO=$(gh api repos/${{ github.repository }}/actions/runs/${{ env.RUN_ID }})
          BRANCH=$(echo "$RUN_INFO" | jq -r '.head_branch')
          SHA=$(echo "$RUN_INFO" | jq -r '.head_sha')
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "Deploy workflow branch: ${{ github.ref_name }}"
          echo "Source run: #${{ env.RUN_ID }}, branch=$BRANCH, sha=$SHA"

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: _artifacts/download
          run-id: ${{ env.RUN_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download user guide
        uses: actions/download-artifact@v4
        with:
          name: user_guide
          path: _artifacts/download

      - name: Download examples
        uses: actions/download-artifact@v4
        with:
          name: examples
          path: _artifacts/download

      - name: List downloaded artifacts
        run: |
          echo '## Downloaded artifacts' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tree -F _artifacts/download | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Organize artifacts for S3
        env:
          BRANCH: ${{ steps.source-run.outputs.branch }}
        run: |
          SRC="_artifacts/download"
          DST="_artifacts/output/releases/${BRANCH}"

          mkdir -p "${DST}/SDK"
          mkdir -p "${DST}/Python Wheels (Linux x86_64)"
          mkdir -p "${DST}/Python Wheels (Windows amd64)"
          mkdir -p "${DST}/Python Wheels (MacOS x86_64)"
          mkdir -p "${DST}/Python Wheels (MacOS ARM)"
          mkdir -p "${DST}/dotNET Bindings"
          mkdir -p "${DST}/Simulator"
          mkdir -p "${DST}/Specifications and documentation"

          # SDK packages
          cp "${SRC}"/opendaq-*_win_*/*.exe   "${DST}/SDK/"
          cp "${SRC}"/opendaq-*_linux_*/*.deb "${DST}/SDK/"

          # Examples
          cp "${SRC}"/opendaq-examples.zip "${DST}/SDK/"

          # Python Wheels
          cp "${SRC}"/opendaq-*-python-wheels-linux/*.whl   "${DST}/Python Wheels (Linux x86_64)/"
          cp "${SRC}"/opendaq-*-python-wheels-windows/*.whl "${DST}/Python Wheels (Windows amd64)/"
          cp "${SRC}"/opendaq-*-python-wheels-macos-x86_64/*.whl "${DST}/Python Wheels (MacOS x86_64)/"
          cp "${SRC}"/opendaq-*-python-wheels-macos-arm64/*.whl "${DST}/Python Wheels (MacOS ARM)/"

          # NuGet
          cp "${SRC}"/opendaq.net-*/*.nupkg "${DST}/dotNET Bindings/"

          # Simulator OVA
          cp "${SRC}"/opendaq-*_device_simulator*/*.ova "${DST}/Simulator/"

          # Documentation
          cp "${SRC}/API Reference"/*.zip "${DST}/Specifications and documentation/cpp_api_reference.zip"
          cp "${SRC}"/user_guide.zip "${DST}/Specifications and documentation/"

      - name: List organized artifacts
        run: |
          echo '## Artifacts ready for S3 upload' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tree -F _artifacts/output | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      # --- S3 Upload (uncomment when AWS credentials are configured) ---

      # - name: Configure AWS credentials
      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      #     aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      #     aws-region: ${{ secrets.AWS_REGION }}

      # - name: Upload to S3
      #   run: |
      #     aws s3 sync _artifacts/output/ "s3://${S3BUCKET}/" --size-only
