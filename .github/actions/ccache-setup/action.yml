name: Setup build cache
description: Configure ccache or MSBuildCache for faster builds

inputs:
  use-msbuild-cache:
    description: 'Use MSBuildCache instead of ccache (Windows + VS 17.9+, experimental)'
    required: false
    default: 'false'
  cmake-config-args:
    description: 'CMake configure arguments (used to extract compiler for cache key)'
    required: false
    default: ''
  cmake-build-type:
    description: 'Build type (Release, Debug) for cache key'
    required: false
    default: ''
  target-arch:
    description: 'Target architecture for cross-compilation (e.g., x86-32, arm64). If not set, detected from host.'
    required: false
    default: ''
  cache-key-prefix:
    description: 'Prefix for cache key (e.g., opendaq, test). If not set, no prefix is used.'
    required: false
    default: ''
  cache-size:
    description: 'Cache size (e.g., 2G for ccache, 2048 for msbuild-cache in MB)'
    required: false
    default: ''
  download-only:
    description: 'If true, only download cache (no auto-save). Use when manually saving cache later with actions/cache/save.'
    required: false
    default: 'false'

outputs:
  cache-hit:
    description: 'Whether cache was restored'
    value: ${{ steps.cache.outputs.cache-hit || steps.cache-download.outputs.cache-hit || steps.msbuild-cache.outputs.cache-hit || steps.msbuild-cache-download.outputs.cache-hit }}
  cache-key:
    description: 'The cache key used'
    value: ${{ steps.cache-key.outputs.cache-key }}
  cache-dir:
    description: 'Path to cache directory'
    value: ${{ steps.cache-key.outputs.dir }}
  msbuild-args:
    description: 'MSBuild arguments for cache support (only when use-msbuild-cache is true)'
    value: ${{ steps.msbuild-cache-setup.outputs.msbuild-args }}

runs:
  using: composite
  steps:
    - name: Calculate cache key
      id: cache-key
      shell: bash
      env:
        CMAKE_CONFIG_ARGS: ${{ inputs.cmake-config-args }}
        CMAKE_BUILD_TYPE: ${{ inputs.cmake-build-type }}
        USE_MSBUILD_CACHE: ${{ inputs.use-msbuild-cache }}
      run: |
        # Determine cache type and directory
        if [ "$USE_MSBUILD_CACHE" == "true" ]; then
          CACHE_TYPE="msbuild"
          CACHE_DIR="${{ github.workspace }}/.msbuildcache"
        else
          CACHE_TYPE="ccache"
          CACHE_DIR="${{ github.workspace }}/.ccache"
        fi

        # Store Unix path for bash operations
        echo "dir-unix=$CACHE_DIR" >> "$GITHUB_OUTPUT"

        # Convert to Windows path if on Windows (for cache action and MSBuild)
        if command -v cygpath &> /dev/null; then
          CACHE_DIR=$(cygpath -w "$CACHE_DIR")
        fi
        echo "type=$CACHE_TYPE" >> "$GITHUB_OUTPUT"
        echo "dir=$CACHE_DIR" >> "$GITHUB_OUTPUT"

        # Get OS and version
        if [[ "$OSTYPE" == "darwin"* ]]; then
          DISTRO="macos"
          VERSION=$(sw_vers -productVersion | cut -d. -f1,2)
        elif [[ "$OSTYPE" == "msys"* ]] || [[ "$OSTYPE" == "cygwin"* ]] || [[ -n "$WINDIR" ]]; then
          DISTRO="windows"
          VERSION="nt$(powershell -Command "[System.Environment]::OSVersion.Version.Major")"
        else
          if command -v lsb_release &> /dev/null; then
            DISTRO=$(lsb_release -is | tr '[:upper:]' '[:lower:]')
            VERSION=$(lsb_release -rs)
          elif [ -f /etc/os-release ]; then
            DISTRO=$(. /etc/os-release && echo "$ID")
            VERSION=$(. /etc/os-release && echo "$VERSION_ID")
          elif [ -f /etc/redhat-release ]; then
            DISTRO="rhel"
            VERSION=$(grep -oE '[0-9]+\.[0-9]+' /etc/redhat-release | head -1)
          else
            DISTRO="linux"
            VERSION="unknown"
          fi
        fi
        echo "distro=${DISTRO}-${VERSION}" >> "$GITHUB_OUTPUT"

        # Get architecture
        if [ -n "${{ inputs.target-arch }}" ]; then
          ARCH="${{ inputs.target-arch }}"
        else
          CMAKE_ARCH=$(echo "$CMAKE_CONFIG_ARGS" | grep -oE '\-A\s*(Win32|x64|ARM64|ARM)' | awk '{print $2}' || true)
          if [ -n "$CMAKE_ARCH" ]; then
            case "$CMAKE_ARCH" in
              x64)    ARCH="x86-64" ;;
              Win32)  ARCH="x86-32" ;;
              ARM64)  ARCH="arm64" ;;
              ARM)    ARCH="arm32" ;;
            esac
          else
            ARCH=$(uname -m)
            case "$ARCH" in
              x86_64)  ARCH="x86-64" ;;
              aarch64) ARCH="arm64" ;;
              armv7l)  ARCH="arm32" ;;
              i686)    ARCH="x86-32" ;;
            esac
          fi
        fi
        echo "arch=$ARCH" >> "$GITHUB_OUTPUT"

        # Extract compiler
        COMPILER=$(echo "$CMAKE_CONFIG_ARGS" | sed -n 's/.*-DCMAKE_CXX_COMPILER=\([^ ]*\).*/\1/p')
        if [ -z "$COMPILER" ] && [ -n "$CXX" ]; then
          COMPILER=$(basename "$CXX")
        fi
        if [ -z "$COMPILER" ]; then
          COMPILER="unknown"
        fi
        echo "compiler=$COMPILER" >> "$GITHUB_OUTPUT"

        # Build type
        BUILD_TYPE=$(echo "$CMAKE_BUILD_TYPE" | tr '[:upper:]' '[:lower:]')
        echo "build-type=$BUILD_TYPE" >> "$GITHUB_OUTPUT"

        # Short commit hash
        SHORT_SHA=$(echo "${{ github.sha }}" | head -c 7)
        echo "short-sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

        # Cache key prefix
        PREFIX="${{ inputs.cache-key-prefix }}"
        if [ -n "$PREFIX" ]; then
          PREFIX="${PREFIX}-"
        fi
        echo "prefix=$PREFIX" >> "$GITHUB_OUTPUT"

        # Full cache key (distro already contains version)
        DISTRO_VER="${DISTRO}-${VERSION}"
        CACHE_KEY="${CACHE_TYPE}-${PREFIX}${DISTRO_VER}-${ARCH}-${COMPILER}-${BUILD_TYPE}-${SHORT_SHA}"
        echo "cache-key=$CACHE_KEY" >> "$GITHUB_OUTPUT"

    # ============ ccache steps ============
    - name: Install ccache
      if: inputs.use-msbuild-cache != 'true'
      shell: bash
      run: |
        SUDO_CMD="sudo -E"
        if ! command -v sudo &> /dev/null; then
          SUDO_CMD=""
        fi

        if ! command -v ccache &> /dev/null; then
          echo "Installing ccache..."
          if command -v apt-get &> /dev/null; then
            $SUDO_CMD apt-get update && $SUDO_CMD apt-get install -y ccache
          elif command -v yum &> /dev/null; then
            $SUDO_CMD yum install -y ccache
          elif command -v brew &> /dev/null; then
            HOMEBREW_NO_AUTO_UPDATE=1 brew install ccache
          elif command -v choco &> /dev/null; then
            choco install ccache -y --no-progress
          else
            echo "::error::Cannot install ccache: no supported package manager found"
            exit 1
          fi
        fi
        echo "ccache version: $(ccache --version | head -1)"

    - name: Restore ccache (with auto-save)
      if: inputs.use-msbuild-cache != 'true' && inputs.download-only != 'true'
      id: cache
      uses: actions/cache@v4
      with:
        path: ${{ steps.cache-key.outputs.dir }}
        key: ${{ steps.cache-key.outputs.cache-key }}
        restore-keys: |
          ccache-${{ steps.cache-key.outputs.prefix }}${{ steps.cache-key.outputs.distro }}-${{ steps.cache-key.outputs.arch }}-${{ steps.cache-key.outputs.compiler }}-${{ steps.cache-key.outputs.build-type }}-

    - name: Restore ccache (download only)
      if: inputs.use-msbuild-cache != 'true' && inputs.download-only == 'true'
      id: cache-download
      uses: actions/cache/restore@v4
      with:
        path: ${{ steps.cache-key.outputs.dir }}
        key: ${{ steps.cache-key.outputs.cache-key }}
        restore-keys: |
          ccache-${{ steps.cache-key.outputs.prefix }}${{ steps.cache-key.outputs.distro }}-${{ steps.cache-key.outputs.arch }}-${{ steps.cache-key.outputs.compiler }}-${{ steps.cache-key.outputs.build-type }}-

    - name: Configure ccache
      if: inputs.use-msbuild-cache != 'true'
      shell: bash
      run: |
        CACHE_DIR="${{ steps.cache-key.outputs.dir }}"
        CACHE_SIZE="${{ inputs.cache-size }}"
        if [ -z "$CACHE_SIZE" ]; then
          CACHE_SIZE="2G"
        fi

        echo "CCACHE_DIR=$CACHE_DIR" >> "$GITHUB_ENV"
        ccache --set-config=cache_dir="$CACHE_DIR"
        ccache --set-config=max_size="$CACHE_SIZE"
        ccache --set-config=compression=true
        ccache -z  # Zero statistics

    # ============ MSBuildCache steps ============
    - name: Setup MSBuildCache
      if: inputs.use-msbuild-cache == 'true'
      id: msbuild-cache-setup
      shell: bash
      run: |
        CACHE_DIR_UNIX="${{ steps.cache-key.outputs.dir-unix }}"
        CACHE_DIR_WIN="${{ steps.cache-key.outputs.dir }}"
        CACHE_SIZE="${{ inputs.cache-size }}"
        if [ -z "$CACHE_SIZE" ]; then
          CACHE_SIZE="2048"
        fi

        # Create cache directory (required for actions/cache save step)
        mkdir -p "$CACHE_DIR_UNIX"

        echo "Creating Directory.Build.props..."
        cat > Directory.Build.props << EOF
        <Project>
          <PropertyGroup>
            <MSBuildCacheLocalCacheRootPath>$CACHE_DIR_WIN</MSBuildCacheLocalCacheRootPath>
            <MSBuildCacheLocalCacheSizeInMegabytes>$CACHE_SIZE</MSBuildCacheLocalCacheSizeInMegabytes>
            <MSBuildCacheLogDirectory>\$(MSBuildCacheLocalCacheRootPath)\logs</MSBuildCacheLogDirectory>
          </PropertyGroup>
          <ItemGroup>
            <PackageReference Include="Microsoft.MSBuildCache.Local" Version="0.1.312-preview" />
          </ItemGroup>
        </Project>
        EOF

        echo "Creating Directory.Build.targets..."
        cat > Directory.Build.targets << EOF
        <Project>
          <Import Project="\$(NuGetPackageRoot)microsoft.msbuildcache.local\0.1.312-preview\build\Microsoft.MSBuildCache.Local.targets" Condition="Exists('\$(NuGetPackageRoot)microsoft.msbuildcache.local\0.1.312-preview\build\Microsoft.MSBuildCache.Local.targets')" />
        </Project>
        EOF

        echo "MSBuildCache configured:"
        echo "  Cache directory: $CACHE_DIR_WIN"
        echo "  Cache size: $CACHE_SIZE MB"

        # Use -switch instead of /switch to avoid Git Bash path conversion
        echo "msbuild-args=-graph -m -reportfileaccesses" >> "$GITHUB_OUTPUT"

    - name: Restore MSBuildCache (with auto-save)
      if: inputs.use-msbuild-cache == 'true' && inputs.download-only != 'true'
      id: msbuild-cache
      uses: actions/cache@v4
      with:
        path: ${{ steps.cache-key.outputs.dir }}
        key: ${{ steps.cache-key.outputs.cache-key }}
        restore-keys: |
          msbuild-${{ steps.cache-key.outputs.prefix }}${{ steps.cache-key.outputs.distro }}-${{ steps.cache-key.outputs.arch }}-${{ steps.cache-key.outputs.compiler }}-${{ steps.cache-key.outputs.build-type }}-

    - name: Restore MSBuildCache (download only)
      if: inputs.use-msbuild-cache == 'true' && inputs.download-only == 'true'
      id: msbuild-cache-download
      uses: actions/cache/restore@v4
      with:
        path: ${{ steps.cache-key.outputs.dir }}
        key: ${{ steps.cache-key.outputs.cache-key }}
        restore-keys: |
          msbuild-${{ steps.cache-key.outputs.prefix }}${{ steps.cache-key.outputs.distro }}-${{ steps.cache-key.outputs.arch }}-${{ steps.cache-key.outputs.compiler }}-${{ steps.cache-key.outputs.build-type }}-
