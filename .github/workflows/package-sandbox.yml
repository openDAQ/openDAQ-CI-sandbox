name: Build openDAQ packages


on:
  push:
    branches: [release/**]

  workflow_dispatch:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

  workflow_call:
    inputs:
      cmake_preset:
        required: false
        type: string
      ctest_preset:
        required: false
        type: string

env:
  cmake_preset: package
  build_path: ${{ github.workspace }}/build
  package_path: ${{ github.workspace }}/build/_packages
  wheels_path: ${{ github.workspace }}/build/wheels
  dotnet_bin_path: ${{ github.workspace }}/build/bindings/CSharp/bin
  package_path_rel: build/_packages # WA for https://github.com/actions/checkout/issues/785
  vm_name: device_simulator
  simulator_app_artifact: SimulatorApp
  simulator_package_artifact: SimulatorPackage
  python_version_build: 3.11
  python_versions: 3.8 3.9 3.10 3.11 3.12 3.13 3.14
  windows_x64_artifact: SdkWindows64
  linux_x64_artifact: SdkLinux64

jobs:
  package_windows:
    runs-on: ${{ matrix.runner }}
    name: ${{ matrix.name }}

    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-${{ matrix.name }}
      cancel-in-progress: true
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        # https://docs.github.com/en/actions/using-github-hosted-runners/about-github-hosted-runners
        include:
          - name: Windows VS 2022 x64 Release
            runner: windows-latest
            cmake-generator: "Visual Studio 17 2022"
            cmake-generator-platform: x64
            cmake-build-type: Release
            cmake-defines: -DOPENDAQ_MSVC_SINGLE_PROCESS_BUILD=ON -DDAQMODULES_PARQUET_RECORDER_MODULE=ON -DPYBIND11_FINDPYTHON=ON
            cpack: NSIS
            disable-ccache: true
            enable-32bit: false

          - name: Windows VS 2022 Win32 Release
            runner: windows-latest
            cmake-generator: "Visual Studio 17 2022"
            cmake-generator-platform: Win32
            cmake-build-type: Release
            cmake-defines: -DOPENDAQ_GENERATE_PYTHON_BINDINGS=OFF -DOPENDAQ_MSVC_SINGLE_PROCESS_BUILD=ON
            cpack: NSIS
            disable-ccache: true
            enable-32bit: true

    outputs:
      # trick for reusable workflow in dotnet_bindings because cannot use env context in "with:"
      # test_path: ''
      windows_x64_artifact_name: ${{ env.windows_x64_artifact }}
      # short_sha: ${{ env.short_sha }}
      short_sha_dotnet: ${{ steps.build_wheels.outputs.short_sha_dotnet }}

    env:
      short_sha: 'package'  # for .NET Bindings build

    steps:
      # TODO: Remove these 3 steps before merging to openDAQ/openDAQ
      - name: Checkout openDAQ
        if: github.repository != 'openDAQ/openDAQ'
        uses: actions/checkout@v4
        with:
          repository: openDAQ/openDAQ

      - name: Checkout CI actions
        if: github.repository != 'openDAQ/openDAQ'
        uses: actions/checkout@v4
        with:
          path: _ci-sandbox

      - name: Copy CI actions
        if: github.repository != 'openDAQ/openDAQ'
        shell: bash
        run: cp -r _ci-sandbox/.github/actions .github/

      - name: Apply patches
        if: github.repository != 'openDAQ/openDAQ'
        shell: bash
        run: |
          if [ ! -d "_ci-sandbox/.github/patches" ]; then
            echo "No patches directory, nothing to apply"
            exit 0
          fi
          for patch in _ci-sandbox/.github/patches/*.patch; do
            [ -f "$patch" ] && git apply "$patch" && echo "Applied: $patch" || true
          done

      - name: Setup ccache
        if: ${{ matrix.disable-ccache != true }}
        uses: openDAQ/openDAQ-CI-sandbox/.github/actions/ccache-setup@actions/ccache-setup
        with:
          cmake-config-args: ${{ matrix.cmake-defines }}
          cmake-build-type: ${{ matrix.cmake-build-type }}
          target-arch: ${{ matrix.enable-32bit == true && 'x86-32' || '' }}

      # TODO: End of sandbox-only steps

      - name: Build SDK
        uses: ./.github/actions/build-sdk
        with:
          additional-dependencies: nsis
          cmake-generator: ${{ matrix.cmake-generator }}
          cmake-config-preset: ${{ env.cmake_preset }}
          cmake-config-args: ${{ matrix.cmake-defines }}
          cmake-build-type: ${{ matrix.cmake-build-type }}
          enable-32bit: ${{ matrix.enable-32bit == true }}

      - name: Set up Python
        if: matrix.enable-32bit != true
        uses: actions/setup-python@v5
        with:
          python-version: |
              3.8
              3.9
              3.10
              3.11
              3.12
              3.13
              3.14

      - name: Build Wheels
        id: build_wheels
        if: matrix.enable-32bit != true
        shell: pwsh
        env:
          dotnetBuildPath: "${{ env.dotnet_bin_path }}/${{ matrix.cmake-generator-platform }}/${{ matrix.cmake-build-type }}"
        run: |
          # for .NET Bindings beta build
          $env:SHORT_SHA = if ( "${{ github.base_ref || github.ref_name }}".Replace('refs/heads/','').StartsWith('release/') ) { '' } else { "${{ env.short_sha }}" }
          if ("$env:SHORT_SHA" -ne '') {
            echo "short_sha_dotnet=$env:SHORT_SHA" >> $env:GITHUB_OUTPUT
          }
          cd build
          mkdir wheels
          $versions = "${{ env.python_versions }}".split(" ")
          foreach ($version in $versions) {
            Write-Output "Building wheel for Python $version"
            cmake --preset ${{ env.cmake_preset }} ${{ matrix.cmake-defines }} -DCMAKE_BUILD_TYPE=${{ matrix.cmake-build-type }} "-DOPENDAQ_PYTHON_VERSION=$version" ..
            cmake --build . --config ${{ matrix.cmake-build-type }} --target py_opendaq
            Write-Output "Creating virtual environment for Python $version"
            Invoke-Expression "py -$version -m venv venv"
            ./venv/Scripts/activate
            pip install numpy pybind11-stubgen
            $remove_python_module_flag = "-r"
            if ($version -eq $versions[-1]) {
              $remove_python_module_flag = $null
            }
            Invoke-Expression "py -${{env.python_version_build}} ../bindings/python/package/build_pip.py -l bin/${{ matrix.cmake-build-type }} $remove_python_module_flag"
            Copy-Item pip/packages/*.whl wheels
            deactivate
            Remove-Item venv -Recurse
          }

      - name: Package
        working-directory: ./build
        run: cpack -C ${{ matrix.cmake-build-type }} -G ${{ matrix.cpack }}

      - name: Rename package
        shell: pwsh
        working-directory: ${{ env.package_path }}
        run: |
          Get-ChildItem -Path .\* -Include *.exe | Rename-Item -NewName {$_.FullName.ToLower()}
          Get-ChildItem -Path .\* -Include *.nupkg | Rename-Item -NewName {$_.FullName.ToLower()}

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: Package (${{ matrix.name }})
          path: ${{ env.package_path }}
          retention-days: 7

      - name: Upload Wheels
        if: matrix.enable-32bit != true
        uses: actions/upload-artifact@v4
        with:
          name: Wheels (${{ matrix.name }})
          path: ${{ env.wheels_path }}
          retention-days: 7

      - name: Upload binaries for .NET Bindings NuGet package
        # "There can be only one for now."
        if: matrix.name == 'Windows VS 2022 x64 Release'
        env:
          dotnetBuildPath: "${{ env.dotnet_bin_path }}/${{ matrix.cmake-generator-platform }}/${{ matrix.cmake-build-type }}"
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.windows_x64_artifact }}
          path: |
            ${{ env.dotnetBuildPath }}
            !${{ env.dotnetBuildPath }}/**/*.json
          # if-no-files-found: error # 'warn' or 'ignore' are also available, defaults to `warn`
          retention-days: 1
