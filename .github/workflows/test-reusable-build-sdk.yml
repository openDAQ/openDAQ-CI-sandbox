name: Test Reusable Build SDK

on:
  pull_request:
    branches:
      - main

jobs:
  test-build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: windows-vs2022
            runner: windows-latest
            cmake-compiler: ""
            cmake-generator-name: Visual Studio 17 2022
            cpack-generator-name: NSIS
            ccache-enable: false
            ctest-exclude-regex: ''

          - id: windows-ninja
            runner: windows-latest
            cmake-compiler: >-
              -DCMAKE_C_COMPILER=cl
              -DCMAKE_CXX_COMPILER=cl
              -DCMAKE_C_COMPILER_LAUNCHER=ccache
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
            cmake-generator-name: Ninja
            cpack-generator-name: ZIP
            ccache-enable: true
            ctest-exclude-regex: ''

          - id: ubuntu-latest
            runner: ubuntu-latest
            cmake-compiler: >-
              -DCMAKE_C_COMPILER=gcc
              -DCMAKE_CXX_COMPILER=g++
              -DCMAKE_C_COMPILER_LAUNCHER=ccache
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
            cmake-generator-name: Ninja
            cpack-generator-name: DEB
            ccache-enable: true
            ctest-exclude-regex: ''

          - id: macos-15-intel
            runner: macos-15-intel
            cmake-compiler: >-
              -DCMAKE_C_COMPILER=clang
              -DCMAKE_CXX_COMPILER=clang++
              -DCMAKE_C_COMPILER_LAUNCHER=ccache
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
            cmake-generator-name: Ninja
            cpack-generator-name: TGZ
            ccache-enable: true
            ctest-exclude-regex: ''

          - id: macos-latest
            runner: macos-latest
            cmake-compiler: >-
              -DCMAKE_C_COMPILER=clang
              -DCMAKE_CXX_COMPILER=clang++
              -DCMAKE_C_COMPILER_LAUNCHER=ccache
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
            cmake-generator-name: Ninja
            cpack-generator-name: TGZ
            ccache-enable: true
            ctest-exclude-regex: 'SkipSamples|ReconnectWhileReading'

    uses: ./.github/workflows/reusable-build-sdk.yml
    with:
      build-id: ${{ matrix.id }}
      runner: ${{ matrix.runner }}
      path: openDAQ
      cmake-compiler: ${{ matrix.cmake-compiler }}
      cmake-generator-name: ${{ matrix.cmake-generator-name }}
      cmake-config-args: >-
        -DOPENDAQ_ENABLE_TESTS=ON
        -DOPENDAQ_BUILD_DOCUMENTATION=OFF
        -DDAQSIMULATOR_ENABLE_SIMULATOR_APP=OFF
        -DDAQMODULES_REF_FB_MODULE=OFF
        -DOPENDAQ_GENERATE_PYTHON_BINDINGS=OFF
        -DDAQMODULES_REF_DEVICE_MODULE=OFF
        -DDAQMODULES_AUDIO_DEVICE_MODULE=OFF
        -DDAQMODULES_OPENDAQ_CLIENT_MODULE=OFF
        -DDAQMODULES_OPENDAQ_SERVER_MODULE=OFF
        -DDAQMODULES_BASIC_CSV_RECORDER_MODULE=OFF
        -DOPENDAQ_ENABLE_OPCUA=OFF
        -DOPENDAQ_ENABLE_WEBSOCKET_STREAMING=OFF
        -DOPENDAQ_ENABLE_NATIVE_STREAMING=OFF
        -DOPENDAQ_MSVC_SINGLE_PROCESS_BUILD=ON
      ctest-enable: true
      ctest-preset: run_tests
      ctest-output-on-failure: true
      gtest-output-xml-path: test_results
      cpack-generator-name: ${{ matrix.cpack-generator-name }}
      ccache-enable: ${{ matrix.ccache-enable }}
      ctest-exclude-regex: ${{ matrix.ctest-exclude-regex }}
