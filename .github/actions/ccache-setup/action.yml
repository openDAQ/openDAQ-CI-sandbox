name: Setup ccache
description: Configure ccache for faster builds with caching

inputs:
  cmake-config-args:
    description: 'CMake configure arguments (used to extract compiler for cache key)'
    required: false
    default: ''
  cmake-build-type:
    description: 'Build type (Release, Debug) for cache key'
    required: false
    default: ''

outputs:
  cache-hit:
    description: 'Whether cache was restored'
    value: ${{ steps.cache.outputs.cache-hit }}

runs:
  using: composite
  steps:
    - name: Install ccache
      shell: bash
      run: |
        if ! command -v ccache &> /dev/null; then
          echo "Installing ccache..."
          if command -v apt-get &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y ccache
          elif command -v brew &> /dev/null; then
            HOMEBREW_NO_AUTO_UPDATE=1 brew install ccache
          else
            echo "::error::✗ Cannot install ccache: no supported package manager found"
            exit 1
          fi
        fi
        echo "ccache version: $(ccache --version | head -1)"

    - name: Calculate ccache key
      id: ccache-key
      shell: bash
      env:
        CMAKE_CONFIG_ARGS: ${{ inputs.cmake-config-args }}
        CMAKE_BUILD_TYPE: ${{ inputs.cmake-build-type }}
      run: |
        CCACHE_DIR="${{ github.workspace }}/.ccache"
        echo "dir=$CCACHE_DIR" >> "$GITHUB_OUTPUT"
        echo "CCACHE_DIR=$CCACHE_DIR" >> "$GITHUB_ENV"

        # Get distro and version (e.g., ubuntu-22.04)
        DISTRO=$(lsb_release -is | tr '[:upper:]' '[:lower:]')
        VERSION=$(lsb_release -rs)
        echo "distro=${DISTRO}-${VERSION}" >> "$GITHUB_OUTPUT"

        # Extract compiler from cmake-config-args (e.g., gcc-12, clang-14)
        COMPILER=$(echo "$CMAKE_CONFIG_ARGS" | grep -oP 'CMAKE_CXX_COMPILER=\K[^\s]+' | sed 's/+//g' || echo "unknown")
        echo "compiler=$COMPILER" >> "$GITHUB_OUTPUT"

        # Build type in lowercase (e.g., release, debug)
        BUILD_TYPE=$(echo "$CMAKE_BUILD_TYPE" | tr '[:upper:]' '[:lower:]')
        echo "build-type=$BUILD_TYPE" >> "$GITHUB_OUTPUT"

        # Short commit hash
        SHORT_SHA=$(echo "${{ github.sha }}" | head -c 7)
        echo "short-sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

    - name: Restore ccache
      id: cache
      uses: actions/cache@v4
      with:
        path: ${{ steps.ccache-key.outputs.dir }}
        key: ccache-${{ steps.ccache-key.outputs.distro }}-${{ steps.ccache-key.outputs.compiler }}-${{ steps.ccache-key.outputs.build-type }}-${{ steps.ccache-key.outputs.short-sha }}
        restore-keys: |
          ccache-${{ steps.ccache-key.outputs.distro }}-${{ steps.ccache-key.outputs.compiler }}-${{ steps.ccache-key.outputs.build-type }}-
          ccache-${{ steps.ccache-key.outputs.distro }}-${{ steps.ccache-key.outputs.compiler }}-${{ steps.ccache-key.outputs.short-sha }}
          ccache-${{ steps.ccache-key.outputs.distro }}-${{ steps.ccache-key.outputs.compiler }}-

    - name: Configure ccache
      shell: bash
      run: |
        ccache --set-config=cache_dir="$CCACHE_DIR"
        ccache --set-config=max_size=2G
        ccache --set-config=compression=true
        ccache -z  # Zero statistics
